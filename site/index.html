<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Questline — live riddle platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f2f2f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#18181b;min-height:100vh}
  a{color:#18181b} a:hover{color:#52525b}
  input,select,textarea{font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid #a1a1aa;outline-offset:0}
  button{font-family:inherit}
  .hidden{display:none!important}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* player frame theme vars set at runtime on #frame */
  #frame{--th-primary:#6366f1;--th-onPrimary:#fff;--th-bg:#fff;--th-ink:#18181b;--th-inkSoft:#52525b;--th-muted:#a1a1aa;
    --th-card:#fff;--th-field:#f4f4f5;--th-line:#e4e4e7;--th-fontDisplay:'Space Grotesk',sans-serif;
    --th-fontBody:-apple-system,sans-serif;--th-displayWeight:600;--th-displayTracking:0;--th-rFrame:16px;--th-rCard:12px;--th-rBtn:10px;--th-rInput:10px}
</style>
</head>
<body>

<!-- ================= TOP BAR ================= -->
<div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 22px;background:#111113;color:#fafafa;flex-wrap:wrap;border-bottom:1px solid #27272a;">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="width:30px;height:30px;border-radius:8px;background:#fafafa;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#111113;">Q</div>
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;line-height:1.1;letter-spacing:.01em;">Questline</div>
      <div style="font-size:10.5px;color:#71717a;letter-spacing:.08em;text-transform:uppercase;">Live riddle platform · prototype v2</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:2px;background:#1c1c1f;border-radius:10px;padding:3px;border:1px solid #27272a;">
    <button id="roleP" onclick="setRole('player')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Player</button>
    <button id="roleA" onclick="setRole('admin')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Game creator</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <button onclick="resetView()" title="Return to the PIN screen" style="border:1px solid #3f3f46;cursor:pointer;padding:7px 13px;border-radius:8px;font-weight:500;font-size:11.5px;background:transparent;color:#a1a1aa;">Reset</button>
  </div>
</div>

<!-- ================= PLAYER ================= -->
<div id="player" style="display:flex;justify-content:center;padding:32px 14px 64px;">
  <div id="frame" style="width:min(408px,100%);border-radius:var(--th-rFrame);overflow:hidden;box-shadow:0 32px 80px -32px rgba(24,24,27,.4),0 4px 16px rgba(24,24,27,.1);background:var(--th-bg);color:var(--th-ink);min-height:730px;display:flex;flex-direction:column;font-family:var(--th-fontBody);">
    <div id="pscreen"></div>
  </div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden"></div>

<div id="toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:100;background:#18181b;color:#fafafa;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 16px 40px -12px rgba(24,24,27,.45);border:1px solid #3f3f46;opacity:0;transition:opacity .2s;pointer-events:none;"></div>

<script>
const SB_URL="https://shgbvoxbwmhhridiihxn.supabase.co";
const ANON="sb_publishable_S_K9CFTHDQRlLQOg9KPclA_wtJyavJr";
const $=id=>document.getElementById(id);
async function rpc(fn,args){const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",
  headers:{apikey:ANON,Authorization:"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify(args)});
  if(!r.ok)throw new Error("http "+r.status);return await r.json();}
let CODE=sessionStorage.getItem("admin_code")||"";
const a=(fn,args={})=>rpc(fn,{p_code:CODE,...args});
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function safeUrl(u){try{const p=new URL(u,location.origin).protocol;return(p==="http:"||p==="https:")?u:"#";}catch{return"#";}}
function fmt(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60,p=n=>String(n).padStart(2,"0");return h?h+":"+p(m)+":"+p(s):p(m)+":"+p(s);}
let toastT;function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1900);}

// ---- role ----
let role="player";
function setRole(r){role=r;if(monTimer){clearInterval(monTimer);monTimer=null;}
  $("roleP").style.background=r==="player"?"#fafafa":"transparent";$("roleP").style.color=r==="player"?"#111113":"#a1a1aa";
  $("roleA").style.background=r==="admin"?"#fafafa":"transparent";$("roleA").style.color=r==="admin"?"#111113":"#a1a1aa";
  $("player").classList.toggle("hidden",r!=="player");
  $("admin").classList.toggle("hidden",r!=="player"?false:true); $("admin").classList.toggle("hidden",r!=="admin");
  if(r==="admin")renderAdmin();
}
function clockPlus(){ // extend the live game by 1 min (real analogue of the sandbox clock)
  adminData?.games?.filter(g=>g.status==="live").forEach(g=>a("admin_extend",{p_game:g.id,p_minutes:1}));
  toast("Live game clock +1 min");
}
function resetView(){pState={screen:"join",pin:"",name:"",active:null,team:""};localStorage.removeItem("q_token");localStorage.removeItem("q_pin");localStorage.removeItem("q_outbox");renderPlayer();}

// ===================== PLAYER =====================
const TH=["primary","onPrimary","bg","ink","inkSoft","muted","card","field","line","fontDisplay","fontBody","displayWeight","displayTracking","rFrame","rCard","rBtn","rInput"];
const map={fontDisplay:"fontDisplay",fontBody:"fontBody"};
function applyTheme(t){if(!t)return;const f=$("frame").style;const kv={primary:"--th-primary",onPrimary:"--th-onPrimary",bg:"--th-bg",ink:"--th-ink",inkSoft:"--th-inkSoft",muted:"--th-muted",card:"--th-card",field:"--th-field",line:"--th-line",fontDisplay:"--th-fontDisplay",fontBody:"--th-fontBody",displayWeight:"--th-displayWeight",displayTracking:"--th-displayTracking",rFrame:"--th-rFrame",rCard:"--th-rCard",rBtn:"--th-rBtn",rInput:"--th-rInput"};
  for(const k in kv)if(t[k]!=null)f.setProperty(kv[k],t[k]);}

let pState={screen:"join",pin:"",name:"",active:null,team:""},pGameState=null,pOffset=0,pRevealed=new Set(),pLookupT;
const pToken=()=>localStorage.getItem("q_token");
const serverNow=()=>Date.now()+pOffset;

async function pLookup(){
  const pin=pState.pin.trim(); if(pin.length<4){pState.active=null;renderPlayer();return;}
  try{const g=await rpc("get_game_by_pin",{p_pin:pin});if(pState.pin.trim()!==pin)return;pState.active=g.error?null:g;if(pState.active&&pState.active.theme)applyTheme(pState.active.theme);}catch{if(pState.pin.trim()===pin)pState.active=null;}
  renderPlayer();
}
async function pEnter(){ if(!pState.active||pState.active.status!=="live"||!pState.name.trim())return; pState.screen="teams"; renderPlayer(); }
function pJoinIndex(i){const t=(pState.active&&pState.active.teams||[])[i];if(t)pJoin(t.name);}
async function pJoin(team){
  const t=(team||pState.team||"").trim(); if(!t)return;
  try{const res=await rpc("join_game",{p_pin:pState.pin,p_team:t,p_name:pState.name});
    if(res.error){toast(joinErr(res.error));return;}
    localStorage.setItem("q_token",res.session_token);localStorage.setItem("q_pin",pState.pin.toUpperCase());
    applyState(res.state);pState.myTeam=t;pState.screen="lobby";renderPlayer();
  }catch{toast("Could not join.");}
}
function joinErr(e){return{bad_team:"Bad team name.",bad_name:"Enter your name.",not_found:"Game not found.",not_live:"Game hasn't started.",expired:"Game has ended.",full:"Team limit reached."}[e]||"Error.";}
function applyState(s){if(s.server_now)pOffset=Date.parse(s.server_now)-Date.now();pGameState=s;if(s.theme)applyTheme(s.theme);}
async function pRefresh(){const t=pToken();if(!t)return;try{const s=await rpc("get_state",{p_session:t});
  if(s.error==="bad_session"){localStorage.removeItem("q_token");pState.screen="join";}
  else{applyState(s);if(!["lobby","game","done"].includes(pState.screen))pState.screen=s.finished?"done":"game";}
  renderPlayer();}catch{}}

// outbox
const loadOut=()=>{try{return JSON.parse(localStorage.getItem("q_outbox")||"[]")}catch{return[]}};
const saveOut=x=>localStorage.setItem("q_outbox",JSON.stringify(x));
async function flush(it){const r=await rpc("submit_answer",{p_session:it.token,p_input:it.input,p_mutation_id:it.mid});saveOut(loadOut().filter(i=>i.mid!==it.mid));return r;}
async function drain(){for(const it of loadOut()){try{await flush(it)}catch{}}}

let pFeedback=null,pAnswer="";
async function pSubmit(){
  const word=pAnswer.trim();if(!word)return;
  const it={token:pToken(),input:word,mid:crypto.randomUUID()};saveOut([...loadOut(),it]);
  try{const res=await flush(it);
    if(res.error==="expired"){pFeedback={msg:"Session ended.",bg:"#fffbeb",color:"#d97706",anim:"none"};await pRefresh();}
    else if(res.correct){pFeedback={msg:"Correct — next challenge",bg:"#f0fdf4",color:"#15803d",anim:"popin .3s ease"};pAnswer="";await pRefresh();return;}
    else{pFeedback={msg:"Not quite — try again",bg:"#fef2f2",color:"#b91c1c",anim:"shake .4s ease"};}
  }catch{pFeedback={msg:"No connection — saved, retrying…",bg:"#fffbeb",color:"#d97706",anim:"none"};}
  renderPlayer();
}

function renderPlayer(){
  const s=pState;
  if(pToken()&&pGameState){
    if(pGameState.finished||pGameState.expired)return pDone();
    if(pGameState.started===false)return pCountdown();
    if(pGameState.paused)return pPaused();
    if(s.screen==="lobby")return pLobby();
    return pGame();
  }
  if(s.screen==="teams")return pTeams();
  return pJoinScreen();
}
// ---- Paused ----
function pPaused(){
  const st=pGameState;
  $("pscreen").innerHTML=`<div style="padding:44px 24px;text-align:center;display:flex;flex-direction:column;gap:14px;min-height:640px;justify-content:center;animation:fadeup .25s ease;">
    <div style="font-size:40px;">⏸</div>
    <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:26px;letter-spacing:var(--th-displayTracking);">Game paused</div>
    <div style="font-size:15px;color:var(--th-inkSoft);line-height:1.6;">${esc(st.pause_message||"The host paused the game. Please wait.")}</div>
    <div style="font-size:12px;color:var(--th-muted);">Your timer is frozen — you won't lose any time.</div></div>`;
}
// ---- notices (toast admin messages, e.g. discarded task) ----
const shownNotices=new Set((()=>{try{return JSON.parse(localStorage.getItem("q_notices")||"[]")}catch{return[]}})());
async function pNotices(){
  const t=pToken();if(!t)return;
  try{const ns=await rpc("get_notices",{p_session:t});if(!Array.isArray(ns))return;
    const fresh=ns.filter(n=>!shownNotices.has(n.id));
    if(fresh.length){fresh.forEach(n=>shownNotices.add(n.id));localStorage.setItem("q_notices",JSON.stringify([...shownNotices]));toast(fresh[0].message);}
  }catch{}
}
// ---- Countdown to start ----
function pCountdown(){
  const st=pGameState;
  const rem=st.starts_at?(Date.parse(st.starts_at)-serverNow())/1000:0;
  $("pscreen").innerHTML=`<div style="padding:40px 24px;display:flex;flex-direction:column;gap:16px;text-align:center;animation:fadeup .25s ease;min-height:640px;justify-content:center;">
    <div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--th-muted);">${esc(st.game_name||"")}</div>
    <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:26px;letter-spacing:var(--th-displayTracking);">Get ready, ${esc(st.team.name)}</div>
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--th-muted);margin-top:6px;">Game starts in</div>
    <div id="pCd" style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:56px;font-variant-numeric:tabular-nums;color:var(--th-primary);">${rem>0?fmt(rem):"0:00"}</div>
    <div style="font-size:13px;color:var(--th-inkSoft);">The first challenge unlocks automatically when the timer hits zero.</div></div>`;
}
// ---- Lobby ----
function pLobby(){
  const st=pGameState,g=pState.active||{};
  const exp=st.expires_at?Math.max(0,(Date.parse(st.expires_at)-serverNow())/1000):null;
  const others=(g.teams||[]).map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--th-rInput);background:var(--th-field);border:1px solid var(--th-line);">
    <span style="font-weight:600;font-size:13.5px;color:var(--th-ink);">${esc(t.name)}</span><span style="font-size:11.5px;color:var(--th-muted);">${t.players} ${t.players===1?"member":"members"}</span></div>`).join("");
  $("pscreen").innerHTML=`<div style="padding:30px 24px;display:flex;flex-direction:column;gap:14px;animation:fadeup .25s ease;">
    <div><div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--th-muted);">You are in</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:27px;margin-top:3px;letter-spacing:var(--th-displayTracking);">${esc(st.team.name)}</div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:17px;">${esc(pState.myTeam||st.team.name)}</div>
        <span style="font-size:11px;font-weight:600;letter-spacing:.06em;padding:4px 11px;border-radius:var(--th-rBtn);border:1px solid var(--th-line);color:var(--th-inkSoft);font-family:'Space Grotesk',monospace;">${esc(localStorage.getItem("q_pin"))}</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;"><span style="font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--th-rBtn);background:var(--th-field);border:1px solid var(--th-line);color:var(--th-ink);">${esc(pState.name)}</span></div>
      <div style="font-size:11.5px;color:var(--th-muted);">Share the game PIN so teammates can join your team.</div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:22px;text-align:center;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--th-muted);">Game in progress</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:48px;font-variant-numeric:tabular-nums;color:var(--th-primary);margin-top:6px;letter-spacing:.01em;">${exp!=null?fmt(exp):"—"}</div>
      <div style="font-size:12px;color:var(--th-inkSoft);margin-top:4px;">time remaining</div></div>
    <button onclick="pState.screen='game';renderPlayer()" style="border:0;cursor:pointer;padding:15px;border-radius:var(--th-rBtn);font-family:var(--th-fontDisplay);font-weight:600;font-size:15.5px;background:var(--th-primary);color:var(--th-onPrimary);">Enter the game</button>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;"><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:15px;">In the lobby</div>
      <span style="font-size:11px;color:var(--th-muted);letter-spacing:.06em;text-transform:uppercase;">${(g.teams||[]).length} teams</span></div>
      <div style="display:flex;flex-direction:column;gap:7px;">${others||'<div style="font-size:12.5px;color:var(--th-muted);">Just your team so far.</div>'}</div></div></div>`;
}
// ---- Join ----
function pJoinScreen(){
  const g=pState.active, live=g&&g.status==="live"&&!g.expired;
  let card;
  if(g){
    const regColor=live?"#15803d":"#a1a1aa", regLabel=live?"Registration open":(g.expired?"Ended":(g.status==="ready"?"Not started":"Draft"));
    card=`<div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:20px;display:flex;flex-direction:column;gap:11px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;">
        <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:19px;">${esc(g.name)}</div>
        <span style="font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:${regColor};">● ${regLabel}</span></div>
      <div style="font-size:13px;color:var(--th-inkSoft);line-height:1.55;">${esc(g.description||"")}</div>
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);margin-top:4px;">Game PIN</label>
      <input id="pin" value="${esc(pState.pin)}" oninput="pState.pin=this.value;clearTimeout(pLookupT);pLookupT=setTimeout(pLookup,350)" placeholder="0000" style="width:100%;box-sizing:border-box;padding:14px;font-size:24px;letter-spacing:.4em;text-align:center;font-weight:600;font-family:'Space Grotesk',monospace;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);text-transform:uppercase;">
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Your name</label>
      <input id="pname" value="${esc(pState.name)}" oninput="pState.name=this.value" placeholder="e.g. Alex" style="width:100%;box-sizing:border-box;padding:13px 15px;font-size:15px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);">
      <button onclick="pEnter()" ${live?"":"disabled"} style="border:0;cursor:pointer;margin-top:6px;padding:15px;border-radius:var(--th-rBtn);font-family:var(--th-fontDisplay);font-weight:600;font-size:15.5px;letter-spacing:.02em;background:var(--th-primary);color:var(--th-onPrimary);min-height:50px;opacity:${live?1:.5};">Enter the game</button>
    </div>`;
  }else{
    card=`<div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:20px;display:flex;flex-direction:column;gap:11px;">
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Game PIN</label>
      <input id="pin" value="${esc(pState.pin)}" oninput="pState.pin=this.value;clearTimeout(pLookupT);pLookupT=setTimeout(pLookup,350)" placeholder="0000" style="width:100%;box-sizing:border-box;padding:14px;font-size:24px;letter-spacing:.4em;text-align:center;font-weight:600;font-family:'Space Grotesk',monospace;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);text-transform:uppercase;">
      <div style="font-size:13.5px;color:var(--th-inkSoft);text-align:center;line-height:1.6;padding:6px 0;">Enter a game PIN to begin.<br>Try <strong>STAR42</strong>.</div></div>`;
  }
  $("pscreen").innerHTML=`<div style="padding:34px 24px;display:flex;flex-direction:column;gap:18px;animation:fadeup .25s ease;">
    <div style="padding:10px 0 2px;">
      <div style="width:44px;height:44px;border-radius:var(--th-rBtn);background:var(--th-primary);display:grid;place-items:center;font-family:var(--th-fontDisplay);font-size:22px;color:var(--th-onPrimary);">Q</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:30px;line-height:1.12;margin-top:14px;letter-spacing:var(--th-displayTracking);">Ready to play?</div>
      <div style="font-size:14px;color:var(--th-inkSoft);margin-top:6px;line-height:1.5;">Enter your game PIN and name to join.</div>
    </div>${card}</div>`;
}
// ---- Team pick ----
function pTeams(){
  const g=pState.active;
  const chips=(g.teams||[]).map((t,i)=>`<button onclick="pJoinIndex(${i})" style="border:1px solid var(--th-line);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:15px 17px;border-radius:var(--th-rCard);background:var(--th-card);color:var(--th-ink);min-height:58px;">
    <span style="display:flex;flex-direction:column;gap:2px;"><span style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:16px;">${esc(t.name)}</span>
    <span style="font-size:12px;color:var(--th-muted);">${t.players} ${t.players===1?"member":"members"}</span></span>

// one themed content block (text/image/video/audio/link) — for hints (and reusable)
function pBlock(b){
  if(b.type==="text")return `<div style="font-size:14px;line-height:1.55;color:var(--th-ink);">${esc(b.text!=null?b.text:(b.content||""))}</div>`;
  const url=b.url!=null?b.url:(b.content||"");
  if(b.type==="image")return `<img src="${esc(safeUrl(url))}" alt="" loading="lazy" style="width:100%;border-radius:var(--th-rInput);border:1px solid var(--th-line);display:block;background:var(--th-field);">`;
  const lbl={video:"Watch video clue",audio:"Play audio clue",url:"Open link",link:"Open link"}[b.type]||"Open link";
  const gl={video:"▶",audio:"♪"}[b.type]||"↗";
  return `<a href="${esc(safeUrl(url))}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);text-decoration:none;color:var(--th-ink);"><span style="width:28px;height:28px;border-radius:50%;background:var(--th-primary);color:var(--th-onPrimary);display:grid;place-items:center;font-size:11px;flex-shrink:0;">${gl}</span><span style="font-weight:600;font-size:12.5px;">${lbl}</span></a>`;
}
// ---- Game ----
function pGame(){
  const st=pGameState,q=st.question;
  if(!q){$("pscreen").innerHTML=`<div style="padding:40px 24px;text-align:center;color:var(--th-inkSoft);animation:fadeup .25s ease;"><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:22px;">Getting things ready…</div><div style="font-size:13.5px;color:var(--th-muted);margin-top:8px;">This game has no challenges yet.</div></div>`;return;}
  if(pGame._lastOrd!==q.ord){pFeedback=null;pAnswer="";pGame._lastOrd=q.ord;}
  const blocks=(q.blocks||[]).map(b=>{
    if(b.type==="text")return `<div style="font-size:15.5px;line-height:1.6;color:var(--th-ink);">${esc(b.text)}</div>`;
    if(b.type==="image")return `<img src="${esc(safeUrl(b.url))}" alt="" loading="lazy" style="width:100%;border-radius:var(--th-rInput);border:1px solid var(--th-line);display:block;background:var(--th-field);">`;
    const lbl={video:"Watch video clue",audio:"Play audio clue",url:"Open link",link:"Open link"}[b.type]||"Open link";
    const gl={video:"▶",audio:"♪",url:"↗",link:"↗"}[b.type]||"↗";
    return `<a href="${esc(safeUrl(b.url))}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:12px 15px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);text-decoration:none;color:var(--th-ink);"><span style="width:30px;height:30px;border-radius:50%;background:var(--th-primary);color:var(--th-onPrimary);display:grid;place-items:center;font-size:11px;flex-shrink:0;">${gl}</span><span style="display:flex;flex-direction:column;min-width:0;"><span style="font-weight:600;font-size:13px;">${lbl}</span><span style="font-size:11px;color:var(--th-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(safeUrl(b.url))}</span></span></a>`;
  }).join("");
  const hints=(st.hints||[]).sort((a,b)=>a.ord-b.ord);
  for(const h of hints)if(h.unlocked&&!pRevealed.has(h.id)){pRevealed.add(h.id);rpc("mark_hint_revealed",{p_session:pToken(),p_hint_id:h.id}).catch(()=>{});}
  const hintHtml=hints.length?hints.map(h=>{
    const open=h.unlocked;const title="Hint "+String(h.ord).padStart(2,"0");
    let badge,badgeColor,body="";
    if(open){badge="unlocked";badgeColor="#15803d";
      const hb=(h.blocks&&h.blocks.length)?h.blocks.map(pBlock).join("")
        :((h.text?`<div style="font-size:14px;color:var(--th-ink);line-height:1.55;">${esc(h.text)}</div>`:"")+(h.media_type&&h.media_url?pBlock({type:h.media_type,url:h.media_url}):""));
      body=`<div style="margin-top:7px;display:flex;flex-direction:column;gap:8px;">${hb}</div>`;
    }else{const rem=(Date.parse(st.activated_at)+h.reveal_after_min*60000-serverNow())/1000;badge="unlocks in "+fmt(rem>0?rem:0);badgeColor="var(--th-muted)";if(rem<=0)setTimeout(pRefresh,400);}
    return `<div style="border-top:1px solid var(--th-line);padding:11px 2px 4px;"><div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline;">
      <span style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:${open?"var(--th-ink)":"var(--th-muted)"};">${title}</span>
      <span ${open?"":`class="pHintCd" data-unlock="${Date.parse(st.activated_at)+h.reveal_after_min*60000}"`} style="font-size:11px;font-weight:600;color:${badgeColor};white-space:nowrap;font-variant-numeric:tabular-nums;">${badge}</span></div>${body}</div>`;
  }).join(""):`<div style="font-size:12.5px;color:var(--th-muted);">No hints for this challenge.</div>`;
  const fb=pFeedback?`<div style="font-size:13px;font-weight:600;text-align:center;padding:9px 12px;border-radius:var(--th-rInput);background:${pFeedback.bg};color:${pFeedback.color};animation:${pFeedback.anim};">${esc(pFeedback.msg)}</div>`:"";
  $("pscreen").innerHTML=`<div style="padding:26px 24px;display:flex;flex-direction:column;gap:14px;animation:fadeup .25s ease;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:10px;">
      <div><div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--th-muted);">${esc(st.team.name)}</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:13px;margin-top:4px;color:var(--th-inkSoft);letter-spacing:.04em;">Challenge ${q.ord} of ${st.total_questions}</div></div>
      <div id="pElapsed" style="font-family:'Space Grotesk',monospace;font-weight:600;font-size:14px;color:var(--th-primary);white-space:nowrap;font-variant-numeric:tabular-nums;"></div></div>
    <div style="height:3px;border-radius:999px;background:var(--th-line);overflow:hidden;"><div style="height:100%;background:var(--th-primary);transition:width .4s ease;width:${(q.ord-1)/st.total_questions*100}%;"></div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:20px;display:flex;flex-direction:column;gap:12px;">
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:22px;line-height:1.2;letter-spacing:var(--th-displayTracking);">${esc(q.title)}</div>
      ${q.intro?`<div style="font-size:13px;color:var(--th-inkSoft);font-style:italic;margin-top:-4px;">${esc(q.intro)}</div>`:""}
      ${blocks}
      ${q.info?`<div style="background:color-mix(in srgb,var(--th-primary) 9%,var(--th-card));border:1px solid color-mix(in srgb,var(--th-primary) 28%,var(--th-line));border-left:3px solid var(--th-primary);border-radius:var(--th-rInput);padding:12px 14px;font-size:13.5px;line-height:1.55;color:var(--th-ink);"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--th-primary);display:block;margin-bottom:4px;">ⓘ Important</span>${esc(q.info)}</div>`:""}
      <div style="display:flex;gap:8px;margin-top:2px;">
        <input id="answer" value="${esc(pAnswer)}" oninput="pAnswer=this.value" onkeydown="if(event.key==='Enter')pSubmit()" placeholder="Your answer" style="flex:1;min-width:0;padding:13px 15px;font-size:15.5px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);">
        <button onclick="pSubmit()" style="border:0;cursor:pointer;padding:0 22px;border-radius:var(--th-rBtn);font-family:var(--th-fontDisplay);font-weight:600;font-size:14.5px;background:var(--th-primary);color:var(--th-onPrimary);min-height:48px;">Submit</button></div>
      ${fb}
      <div style="font-size:11px;color:var(--th-muted);text-align:center;">Shared progress — any teammate's correct answer advances the team.</div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;display:flex;flex-direction:column;gap:9px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;"><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:15px;">Hints</div>
      <span style="font-size:10.5px;color:var(--th-muted);letter-spacing:.05em;text-transform:uppercase;">unlock over time · free</span></div>${hintHtml}</div></div>`;
  const el=$("answer");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
}
// ---- Finish ----
async function pDone(){
  const st=pGameState;let board=[];try{board=await rpc("leaderboard",{p_pin:localStorage.getItem("q_pin")});}catch{}
  const fin=!!st.finished;
  const myRank=fin?((board.findIndex(r=>r.name===st.team.name)+1)||"—"):"—";
  const kicker=fin?"Quest complete":"Game over";
  const headline=fin?"All challenges solved.":"The host ended the game.";
  const sub=fin?("Well played, "+esc(st.team.name)+"."):"Here are the final standings.";
  const doneTime=fin?fmt(st.total_seconds||0):"—";
  const rows=board.map((r,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--th-line);${r.name===st.team.name?'background:var(--th-field);':''}">

    <span style="font-size:12.5px;font-weight:600;color:var(--th-ink);white-space:nowrap;font-variant-numeric:tabular-nums;">${fmt(r.total_seconds)}</span></div>`).join("");
  $("pscreen").innerHTML=`<div style="padding:36px 24px;display:flex;flex-direction:column;gap:18px;animation:fadeup .3s ease;">
    <div style="padding:6px 0;"><div style="font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--th-muted);">${kicker}</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:34px;line-height:1.1;margin-top:8px;letter-spacing:var(--th-displayTracking);animation:popin .35s ease;">${headline}</div>
      <div style="font-size:14px;color:var(--th-inkSoft);margin-top:6px;">${sub}</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:16px;"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Final rank</div><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:32px;color:var(--th-primary);margin-top:4px;">${myRank}</div></div>
      <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:16px;"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Total time</div><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:32px;color:var(--th-primary);margin-top:4px;font-variant-numeric:tabular-nums;">${doneTime}</div></div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;"><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:15px;margin-bottom:8px;">Final standings</div><div style="display:flex;flex-direction:column;">${rows||'<div style="font-size:12.5px;color:var(--th-muted);padding:8px 0;">No finishers yet.</div>'}</div></div>
    <button onclick="resetView()" style="border:1px solid var(--th-line);cursor:pointer;padding:13px;border-radius:var(--th-rBtn);font-weight:600;font-size:13.5px;background:transparent;color:var(--th-ink);">Back to start</button></div>`;
}

// elapsed ticker
setInterval(()=>{if(role!=="player"||!pGameState||pGameState.finished)return;
  if(pGameState.started===false){ // pre-start countdown + auto-start
    const rem=pGameState.starts_at?(Date.parse(pGameState.starts_at)-serverNow())/1000:0;
    const cd=$("pCd");if(cd)cd.textContent=rem>0?fmt(rem):"0:00";
    if(rem<=0){pState.screen="game";pRefresh();}
    return;
  }
  if(!pGameState.activated_at)return;
  const el=$("pElapsed");if(el)el.textContent=fmt((serverNow()-Date.parse(pGameState.activated_at))/1000);
  let due=false;document.querySelectorAll(".pHintCd").forEach(cd=>{const rem=(+cd.dataset.unlock-serverNow())/1000;cd.textContent=rem>0?("unlocks in "+fmt(rem)):"unlocking…";if(rem<=0)due=true;});if(due)pRefresh();},1000);
setInterval(()=>{if(role==="player"&&pToken()){pRefresh();drain();pNotices();}},10000);

async function selectGame(id){selGame=await a("admin_get_game",{p_game:id});selRoster=await a("admin_roster",{p_game:id});drawAdmin();}
function localDT(iso){if(!iso)return"";const d=new Date(iso);const p=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes());}
async function setSchedule(id){const v=$("schedInput").value;const iso=v?new Date(v).toISOString():null;await a("admin_set_schedule",{p_game:id,p_starts_at:iso});toast("Start time saved");selectGame(id);}
async function startNow(id){if(!confirm("Start the game now for all teams?"))return;await a("admin_start_now",{p_game:id});toast("Game started");adminData=await a("admin_list");selectGame(id);}
async function stopGame(id){if(!confirm("End the game now? The leaderboard freezes and this can't be undone."))return;await a("admin_stop",{p_game:id});toast("Game ended");adminData=await a("admin_list");selectGame(id);}
async function toggleReg(id,open){await a("admin_set_registration",{p_game:id,p_open:open});toast(open?"Registration open":"Registration closed");selectGame(id);}
async function showHintFor(teamId){
  const res=await a("admin_team_hints",{p_team:teamId});const hs=res.hints||[];
  if(!hs.length){toast("No hints on the team's current task");return;}
  const next=hs.find(h=>!h.shown);
  if(!next){toast("All hints already shown");return;}
  await a("admin_show_hint",{p_team:teamId,p_hint:next.id});toast("Revealed hint "+next.ord+" to the team");
  if(adminView==="monitor")startMon();
}
async function discardTask(gameId,ord,title){
  const reason=prompt('Discard "'+title+'"? Teams on it move on; time is credited back to teams that already solved it.\n\nCause (shown to all players):',"");
  if(reason===null)return;
  await a("admin_discard_task",{p_game:gameId,p_ord:ord,p_reason:reason});toast("Task discarded — players notified");selectGame(gameId);}
function selectedDetail(){
  const g=selGame,d=dot[g.status]||dot.draft;
  const btn=(label,onclick,danger)=>`<button onclick="${onclick}" style="border:1px solid ${danger?"#fecaca":"#e4e4e7"};cursor:pointer;padding:9px 15px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:${danger?"#dc2626":"#18181b"};">${label}</button>`;
  const actions=[
    btn("Edit in wizard",`editWiz('${g.id}')`),
    btn("Rename",`renameGame('${g.id}')`),
    btn("Duplicate",`duplicateGame('${g.id}')`),
    btn("Leaderboard",`showLeaderboard('${g.id}')`),
    btn("Delete",`delGame('${g.id}')`,true),
  ];
  const q=g.questions.map((x,i)=>`<div style="border:1px solid #f0f0f1;border-radius:11px;padding:14px 16px;background:#fafafa;">
    <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;"><strong style="font-size:13.5px;color:#18181b;">Q${i+1}. ${esc(x.title)}</strong>
    <span style="font-size:12px;color:#71717a;">Answer · <strong style="color:#15803d;">${esc(x.answer||"")}</strong></span></div>
    <div style="font-size:12.5px;color:#52525b;margin-top:5px;line-height:1.5;">${esc(x.intro||"")}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;">${(x.blocks||[]).length?`<span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:#f0f0f1;color:#52525b;">${x.blocks.length} blocks</span>`:""}${(x.hints||[]).length?`<span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:#f0f0f1;color:#52525b;">${x.hints.length} hints</span>`:""}</div></div>`).join("");
  return `<div style="background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div><div style="display:flex;align-items:baseline;gap:10px;"><h2 style="margin:0;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#18181b;">${esc(g.name)}</h2>
      <span style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:${d[0]};">● ${d[1]}</span></div>
      <div style="font-size:13px;color:#71717a;margin-top:4px;">${esc(g.description||"")}</div>
      <div style="font-size:12px;color:#71717a;margin-top:7px;">PIN <strong style="font-family:'Space Grotesk',monospace;">${g.pin}</strong> · ${g.questions.length} questions</div></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">${actions.join("")}</div></div>
    ${controlsPanel(g)}
    ${q?`<div style="border-top:1px solid #f0f0f1;padding-top:16px;"><h2 style="margin:0 0 12px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:#18181b;">Questions</h2><div style="display:flex;flex-direction:column;gap:9px;">${qList(g)}</div></div>`:""}</div>`;
}
function statCard(k,v){return `<div style="background:#fafafa;border:1px solid #f0f0f1;border-radius:10px;padding:13px;"><div style="font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">${k}</div><div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;color:#18181b;margin-top:3px;">${v}</div></div>`;}
function qList(g){return g.questions.map((x,i)=>`<div style="border:1px solid #f0f0f1;border-radius:11px;padding:14px 16px;background:#fafafa;">
    <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline;"><strong style="font-size:13.5px;color:#18181b;">Q${i+1}. ${esc(x.title)}${x.case_sensitive?' <span style="font-size:9px;color:#a1a1aa;text-transform:uppercase;letter-spacing:.06em;">· case-sensitive</span>':''}</strong>
    <span style="display:flex;gap:8px;align-items:baseline;"><span style="font-size:12px;color:#71717a;">Answer · <strong style="color:#15803d;">${esc(x.answer||"")}</strong></span>
    <button onclick="discardTask('${g.id}',${x.ord},'${esc(x.title).replace(/'/g,"")}')" style="border:1px solid #fecaca;background:#fff;color:#dc2626;cursor:pointer;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;">Discard</button></span></div>
    ${x.intro?`<div style="font-size:12.5px;color:#52525b;margin-top:5px;line-height:1.5;">${esc(x.intro)}</div>`:""}
    ${x.info?`<div style="font-size:11.5px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:6px 9px;margin-top:6px;">ⓘ ${esc(x.info)}</div>`:""}
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;">${(x.blocks||[]).length?`<span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:#f0f0f1;color:#52525b;">${x.blocks.length} blocks</span>`:""}${(x.hints||[]).length?`<span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:#f0f0f1;color:#52525b;">${x.hints.length} hints</span>`:""}</div></div>`).join("");
}
const lbl=t=>`<label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">${t}</label>`;
function controlsPanel(g){
  const r=selRoster||{};
  const ended=g.status==="ended", activated=g.status==="live";
  const started=g.starts_at&&new Date(g.starts_at).getTime()<=Date.now()+15000; // 15s skew buffer
  const paused=!!g.paused_at;
  const teamsHtml=(r.teams||[]).map(t=>`<div style="border:1px solid #f0f0f1;border-radius:10px;padding:11px 13px;background:#fafafa;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;"><strong style="font-size:13px;color:#18181b;">${esc(t.name)}</strong>
    <button onclick="showHintFor('${t.id}')" style="border:1px solid #e4e4e7;background:#fff;cursor:pointer;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;color:#18181b;">Show hint</button></div>
    <div style="font-size:11.5px;color:#71717a;margin-top:4px;">${(t.players||[]).map(esc).join(", ")||"—"}</div></div>`).join("");
  const reg=`<div style="display:flex;flex-direction:column;gap:5px;">${lbl("Registration")}
    <button onclick="toggleReg('${g.id}',${!g.registration_open})" style="border:1px solid ${g.registration_open?'#bbf7d0':'#fecaca'};cursor:pointer;padding:9px 15px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:${g.registration_open?'#15803d':'#dc2626'};">${g.registration_open?"Open — click to close":"Closed — click to open"}</button></div>`;
  let life="";
  if(ended){ life=`<div style="font-size:13px;color:#71717a;font-weight:600;">This game has ended. Duplicate it to run again.</div>`; }
  else if(!activated){ life=`<div style="display:flex;flex-direction:column;gap:5px;">${lbl("Not activated")}
    <button onclick="activateGame('${g.id}')" style="border:0;cursor:pointer;padding:10px 18px;border-radius:9px;font-weight:600;font-size:13px;background:#18181b;color:#fff;">Confirm &amp; Activate — open registration</button></div>`; }
  else if(!started){ life=`<div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;">
    <div style="display:flex;flex-direction:column;gap:5px;">${lbl("Scheduled start · auto-starts, or start early")}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;"><input type="datetime-local" id="schedInput" value="${localDT(g.starts_at)}" style="padding:9px 12px;border:1px solid #e4e4e7;border-radius:9px;font-size:13px;color:#18181b;">
      <button onclick="setSchedule('${g.id}')" style="border:1px solid #e4e4e7;cursor:pointer;padding:8px 13px;border-radius:9px;font-weight:600;font-size:12px;background:#fff;color:#18181b;">Set</button>
      <button onclick="startNow('${g.id}')" style="border:0;cursor:pointer;padding:8px 14px;border-radius:9px;font-weight:600;font-size:12px;background:#18181b;color:#fff;">Start game</button></div></div>${reg}</div>`; }
  else { life=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
    <div style="display:flex;flex-direction:column;gap:5px;">${lbl("Game "+(paused?"paused":"running"))}
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${paused?`<button onclick="resumeGame('${g.id}')" style="border:0;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#15803d;color:#fff;">Resume</button>`
                :`<button onclick="pauseGame('${g.id}')" style="border:1px solid #e4e4e7;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:#18181b;">Pause…</button>`}
        <button onclick="stopGame('${g.id}')" style="border:0;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#b91c1c;color:#fff;">End game</button></div></div>${reg}</div>`; }
  return `<div style="border-top:1px solid #f0f0f1;padding-top:16px;display:flex;flex-direction:column;gap:14px;">
    ${life}
    <div id="lbPanel"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;">
      ${statCard("Status", dot[g.status][1]+(paused?" · paused":""))}${statCard("Teams", r.team_count??0)}${statCard("Players", r.player_count??0)}${statCard("Starts", g.starts_at?new Date(g.starts_at).toLocaleString():"—")}</div>
    ${(r.teams||[]).length?`<div><div style="font-size:12px;font-weight:600;color:#18181b;margin-bottom:8px;">Joined teams — <span style="color:#a1a1aa;font-weight:500;">live</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">${teamsHtml}</div></div>`:'<div style="font-size:12px;color:#a1a1aa;">No teams joined yet.</div>'}
  </div>`;
}
async function activateGame(id){await a("admin_activate",{p_game:id});toast("Registration open");adminData=await a("admin_list");selectGame(id);}
async function pauseGame(id){const m=prompt("Message players see while paused:","We've paused briefly — hang tight!");if(m===null)return;await a("admin_pause",{p_game:id,p_message:m});toast("Game paused");adminData=await a("admin_list");selectGame(id);}
async function resumeGame(id){await a("admin_resume",{p_game:id});toast("Game resumed");adminData=await a("admin_list");selectGame(id);}
async function renameGame(id){const g=adminData.games.find(x=>x.id===id)||selGame||{};const n=prompt("New game name:",g.name||"");if(n===null||!n.trim())return;await a("admin_rename",{p_game:id,p_name:n.trim()});toast("Renamed");adminData=await a("admin_list");selectGame(id);}
async function duplicateGame(id){const res=await a("admin_duplicate",{p_game:id});if(res.error){toast("Error");return;}toast("Duplicated → draft");adminData=await a("admin_list");selectGame(res.id);}
async function showLeaderboard(id){const g=adminData.games.find(x=>x.id===id)||selGame||{};let lb=[];try{lb=await rpc("leaderboard",{p_pin:g.pin});}catch{}
  const el=$("lbPanel");if(!el)return;
  el.innerHTML=`<div style="background:#fafafa;border:1px solid #f0f0f1;border-radius:11px;padding:14px 16px;"><div style="font-weight:600;font-size:13px;color:#18181b;margin-bottom:8px;">Leaderboard — finished teams</div>
    ${lb.length?`<table style="width:100%;border-collapse:collapse;">${lb.map((r,i)=>`<tr><td style="padding:5px 4px;border-bottom:1px solid #f0f0f1;font-size:13px;">${i+1}. ${esc(r.name)}</td><td style="padding:5px 4px;border-bottom:1px solid #f0f0f1;text-align:right;font-size:13px;font-variant-numeric:tabular-nums;">${fmt(r.total_seconds)}</td></tr>`).join("")}</table>`:'<div style="font-size:12.5px;color:#a1a1aa;">No finishers yet.</div>'}</div>`;
}
async function delGame(id){const g=adminData.games.find(x=>x.id===id)||selGame||{};if(!confirm('Delete "'+(g.name||"this game")+'"?'))return;await a("admin_delete_game",{p_game:id});selGame=null;adminData=await a("admin_list");drawAdmin();}

// ---- Wizard ----
function blankQ(){return{title:"",answer:"",intro:"",info:"",case_sensitive:false,blocks:[],hints:[]};}
function moveWHint(i,d){const n=i+d,hs=wiz.questions[wiz.sel].hints;if(n<0||n>=hs.length)return;[hs[i],hs[n]]=[hs[n],hs[i]];drawAdmin();}
function newWiz(){wiz={id:null,name:"",description:"",duration_min:240,max_teams:20,theme_id:adminData.themes[0]?.id||"",questions:[],sel:0,wbType:"text",wbContent:""};wizStep=1;}
async function editWiz(id){const g=await a("admin_get_game",{p_game:id});wiz={id:g.id,name:g.name||"",description:g.description||"",duration_min:g.duration_min,max_teams:g.max_teams,theme_id:g.theme_id||adminData.themes[0]?.id||"",
  questions:(g.questions||[]).map(q=>({title:q.title||"",answer:q.answer||"",intro:q.intro||"",info:q.info||"",case_sensitive:!!q.case_sensitive,blocks:(q.blocks||[]).map(b=>({type:b.type,content:b.text||b.url||""})),
    hints:(q.hints||[]).map(h=>{let bl=(h.blocks||[]).map(b=>({type:b.type,content:b.text||b.url||""}));if(!bl.length){if(h.text)bl.push({type:"text",content:h.text});if(h.media_type&&h.media_url)bl.push({type:h.media_type,content:h.media_url});}return {reveal_after_min:h.reveal_after_min,blocks:bl,_bt:"text",_bc:""};})})),sel:0,wbType:"text",wbContent:""};
  wizStep=2;adminGo("wizard");}
const setW=(f,v)=>{wiz[f]=v;};
function viewWizard(){
  const steps=[["01","Basics"],["02","Questions"],["03","Theme"],["04","Review"]];
  const stepBtns=steps.map((s,i)=>{const n=i+1,on=wizStep===n;return `<button onclick="wizStep=${n};drawAdmin()" style="border:1px solid ${on?"#18181b":"#e4e4e7"};cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 15px;border-radius:9px;font-weight:600;font-size:12px;background:${on?"#18181b":"#fff"};color:${on?"#fff":"#52525b"};"><span style="font-family:'Space Grotesk',monospace;font-size:11px;color:${on?"#a1a1aa":"#a1a1aa"};">${s[0]}</span> ${s[1]}</button>`;}).join("");
  let body="";
  if(wizStep===1)body=wizStep1();
  else if(wizStep===2)body=wizStep2();
  else if(wizStep===3)body=wizStep3();
  else body=wizStep4();
  return `<section style="background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div><h1 style="margin:0;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;color:#18181b;">${wiz.id?"Edit game":"Create a game"}</h1>
      <p style="margin:5px 0 0;font-size:12.5px;color:#71717a;">Basics → Questions &amp; hints → Theme → Review.</p></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;"><button onclick="downloadXlsxTemplate()" style="border:1px solid #e4e4e7;cursor:pointer;padding:8px 13px;border-radius:9px;font-weight:600;font-size:12px;background:#fff;color:#52525b;">XLSX template</button>
      <label style="border:1px solid #e4e4e7;cursor:pointer;padding:8px 13px;border-radius:9px;font-weight:600;font-size:12px;background:#fff;color:#52525b;display:inline-flex;align-items:center;">Import XLSX<input type="file" accept=".xlsx,.xls" onchange="importXlsx(event)" style="display:none;"></label></div></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">${stepBtns}</div>${body}
    <div style="display:flex;justify-content:space-between;border-top:1px solid #f0f0f1;padding-top:14px;">
      <button onclick="wizStep=Math.max(1,wizStep-1);drawAdmin()" style="border:1px solid #e4e4e7;cursor:pointer;padding:10px 18px;border-radius:9px;font-weight:600;font-size:13px;background:#fff;color:#52525b;">Back</button>
      <button onclick="wizStep=Math.min(4,wizStep+1);drawAdmin()" style="border:0;cursor:pointer;padding:10px 24px;border-radius:9px;font-weight:600;font-size:13px;background:#18181b;color:#fff;">Next</button></div></section>`;
}
function wizStep1(){return `<div style="display:flex;flex-direction:column;gap:12px;max-width:560px;">
  <div style="display:flex;flex-direction:column;gap:5px;"><label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">Game name</label>
  <input value="${esc(wiz.name)}" oninput="setW('name',this.value)" placeholder="e.g. Harbor Heist" style="padding:12px 14px;border:1px solid #e4e4e7;border-radius:10px;font-size:15px;color:#18181b;"></div>
  <div style="display:flex;flex-direction:column;gap:5px;"><label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">Description / story intro</label>
  <textarea oninput="setW('description',this.value)" placeholder="A short story to set the mood…" style="padding:12px 14px;border:1px solid #e4e4e7;border-radius:10px;font-size:14px;min-height:84px;resize:vertical;color:#18181b;">${esc(wiz.description)}</textarea></div>
  <div style="display:flex;flex-direction:column;gap:5px;max-width:200px;"><label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">Max teams</label><input type="number" value="${wiz.max_teams}" oninput="setW('max_teams',+this.value)" style="padding:12px 14px;border:1px solid #e4e4e7;border-radius:10px;font-size:14px;"></div>
  <p style="font-size:11.5px;color:#a1a1aa;margin:0;">No fixed duration — the game runs until you stop it (or all teams finish).</p></div>`;}
function wizStep2(){
  const list=wiz.questions.map((q,i)=>{const on=wiz.sel===i;return `<div style="display:flex;align-items:center;gap:6px;border:1px solid ${on?"#18181b":"#e4e4e7"};border-radius:10px;padding:10px 12px;background:${on?"#fafafa":"#fff"};">
    <button onclick="wiz.sel=${i};drawAdmin()" style="flex:1;border:0;background:transparent;cursor:pointer;text-align:left;min-width:0;"><div style="font-weight:600;font-size:12.5px;color:#18181b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Q${i+1}. ${esc(q.title||"Untitled")}</div>
    <div style="font-size:11px;color:#a1a1aa;">${q.blocks.length} blocks · ${q.hints.length} hints</div></button>
    <button onclick="moveQ(${i},-1)" style="border:0;background:transparent;cursor:pointer;font-size:13px;color:#a1a1aa;padding:2px 4px;">↑</button>
    <button onclick="delWQ(${i})" style="border:0;background:transparent;cursor:pointer;font-size:13px;color:#dc2626;padding:2px 4px;">✕</button></div>`;}).join("");
  const q=wiz.questions[wiz.sel];
  const editor=q?wqEditor(q):`<div style="font-size:12px;color:#a1a1aa;border:1px dashed #e4e4e7;border-radius:10px;padding:16px;text-align:center;">Select or add a question.</div>`;
  return `<div style="display:grid;grid-template-columns:minmax(210px,300px) 1fr;gap:18px;align-items:start;">
    <div style="display:flex;flex-direction:column;gap:8px;"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:13px;color:#18181b;">Questions</strong>
    <button onclick="addWQ()" style="border:0;cursor:pointer;padding:7px 13px;border-radius:8px;font-weight:600;font-size:12px;background:#18181b;color:#fff;">Add</button></div>
    ${list||'<div style="font-size:12px;color:#a1a1aa;border:1px dashed #e4e4e7;border-radius:10px;padding:16px;text-align:center;">No questions yet — add one or import an XLSX.</div>'}</div>${editor}</div>`;
}
function wqEditor(q){

async function saveWiz(status){
  const payload={id:wiz.id||"",name:wiz.name,description:wiz.description,duration_min:wiz.duration_min,max_teams:wiz.max_teams,theme_id:wiz.theme_id,
    questions:wiz.questions.map(q=>({title:q.title,intro:q.intro,info:q.info||"",case_sensitive:!!q.case_sensitive,answer:q.answer,alt_answers:[],
      blocks:q.blocks.map(b=>b.type==="text"?{type:"text",text:b.content}:{type:b.type==="url"?"link":b.type,url:b.content}),
      hints:q.hints.map(h=>({reveal_after_min:h.reveal_after_min,
        blocks:(h.blocks||[]).map(b=>b.type==="text"?{type:"text",text:b.content}:{type:(b.type==="url"||b.type==="link")?"link":b.type,url:b.content})}))}))};
  const res=await a("admin_save_game",{p_payload:payload});
  if(res.error){toast("Error: "+res.error);return;}
  if(status==="ready")await a("admin_set_status",{p_game:res.id,p_status:"ready"});
  else if(status==="live")await a("admin_activate",{p_game:res.id});

}

const _mt=v=>{const s=String(v||"").trim().toLowerCase();return ["image","video","audio","link","url"].includes(s)?(s==="url"?"link":s):"";};
function importXlsx(ev){const f=ev.target.files[0];if(!f)return;
  if(typeof XLSX==="undefined"){toast("Spreadsheet library still loading — try again");return;}
  const rd=new FileReader();
  rd.onload=()=>{try{
    const wb=XLSX.read(new Uint8Array(rd.result),{type:"array"});
    const findSheet=n=>wb.SheetNames.find(s=>s.toLowerCase()===n)||wb.SheetNames.find(s=>s.toLowerCase().includes(n));
    const qs=wb.Sheets[findSheet("questions")]; if(!qs){toast("No 'Questions' sheet found");return;}
    const hs=wb.Sheets[findSheet("hints")];
    const get=(r,k)=>{const kk=Object.keys(r).find(x=>x.toLowerCase().replace(/\s/g,"")===k);return kk?String(r[kk]).trim():"";};
    const qrows=XLSX.utils.sheet_to_json(qs,{defval:""}).filter(r=>get(r,"title"));
    const byTitle={};
    const added=qrows.map(r=>{
      const blocks=[]; const t=get(r,"text"); if(t)blocks.push({type:"text",content:t});
      const mt=_mt(get(r,"mediatype")), mu=get(r,"mediaurl"); if(mt&&mu)blocks.push({type:mt,content:mu});
      const q={title:get(r,"title"),intro:get(r,"intro"),answer:get(r,"answer"),info:get(r,"info"),
        case_sensitive:/^(y|yes|true|1|case)/i.test(get(r,"casesensitive")),blocks,hints:[]};
      byTitle[q.title.toLowerCase()]=q; return q;
    });
    (hs?XLSX.utils.sheet_to_json(hs,{defval:""}):[]).forEach(r=>{
      const q=byTitle[get(r,"question").toLowerCase()]; if(!q)return;
      const blocks=[]; const t=get(r,"text"); if(t)blocks.push({type:"text",content:t});
      const mt=_mt(get(r,"mediatype")), mu=get(r,"mediaurl"); if(mt&&mu)blocks.push({type:mt,content:mu});
      q.hints.push({reveal_after_min:+get(r,"revealaftermin")||0,blocks,_bt:"text",_bc:""});
    });
    added.forEach(q=>wiz.questions.push(q)); wiz.sel=Math.max(0,wiz.questions.length-1); drawAdmin();
    toast("Imported "+added.length+" questions, "+added.reduce((n,q)=>n+q.hints.length,0)+" hints");
  }catch(e){toast("Import failed: "+e.message);}};
  rd.readAsArrayBuffer(f); ev.target.value="";}

      <div><h1 style="margin:0;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;color:#18181b;">Live monitor</h1>
      <p style="margin:5px 0 0;font-size:12.5px;color:#71717a;">Watching "${esc(live.name||"")}" — PIN ${live.pin||""}</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;"><button onclick="pauseGame('${id}')" style="border:1px solid #e4e4e7;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:#18181b;">Pause…</button>
      <button onclick="resumeGame('${id}')" style="border:1px solid #e4e4e7;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:#18181b;">Resume</button>
      <button onclick="stopGame('${id}')" style="border:0;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#b91c1c;color:#fff;">End game</button></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px;">${stats.map(s=>`<div style="background:#fafafa;border:1px solid #f0f0f1;border-radius:10px;padding:13px;"><div style="font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">${s[0]}</div><div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;color:#18181b;margin-top:3px;">${s[1]}</div></div>`).join("")}</div></div>`;
  const tv=$("monTeams");if(tv)tv.innerHTML=`<div style="background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:24px;">
    <h2 style="margin:0 0 14px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;color:#18181b;">Team progress</h2><div style="display:flex;flex-direction:column;gap:9px;">
    ${m.teams.length?m.teams.map(t=>{const fin=!!t.finished_at;const pct=fin?100:Math.round(((t.stage_ord||1)-1)/m.total_questions*100);const c=fin?"#15803d":"#6366f1";
      return `<div style="border:1px solid #f0f0f1;border-radius:11px;padding:13px 16px;background:#fafafa;display:flex;flex-direction:column;gap:9px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="display:flex;align-items:baseline;gap:9px;"><strong style="font-size:13.5px;color:#18181b;">${esc(t.name)}</strong><span style="font-size:11px;color:#a1a1aa;">${t.players} ${t.players===1?"member":"members"}</span></div>
        <div style="display:flex;align-items:baseline;gap:12px;"><span style="font-size:12px;color:#71717a;">${fin?"Finished":"Q"+(t.stage_ord||1)+" "+esc(t.stage_title||"")}</span>
          <span style="font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:#18181b;font-family:'Space Grotesk',monospace;">${fmt(fin?t.total_seconds:t.seconds_on_stage)}</span>
          <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:${fin?'#15803d':'#6366f1'};">● ${fin?'Finished':'Playing'}</span>
          <button onclick="resetTeam('${t.id}')" style="border:1px solid #fecaca;background:#fff;color:#dc2626;cursor:pointer;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;">Reset</button></div></div>
      <div style="height:4px;border-radius:999px;background:#ececee;overflow:hidden;"><div style="height:100%;border-radius:999px;background:${c};transition:width .4s ease;width:${pct}%;"></div></div></div>`;}).join("")
    :'<div style="border:1px dashed #e4e4e7;border-radius:12px;padding:24px;text-align:center;color:#a1a1aa;font-size:13px;">No teams yet. Join from the Player view.</div>'}</div></div>`;
}
async function resetTeam(id){if(!confirm("Reset this team to the start?"))return;await a("admin_reset_team",{p_team:id});toast("Reset");}
async function endGameMon(id){if(!confirm("End this game for all players?"))return;await a("admin_set_status",{p_game:id,p_status:"ended"});toast("Game ended");if(monTimer){clearInterval(monTimer);monTimer=null;}adminData=await a("admin_list");drawAdmin();}

// boot
setRole("player");
renderPlayer();
if(pToken())pRefresh();
</script>
</body>
</html>
