<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Questline — live riddle platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f2f2f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#18181b;min-height:100vh}
  a{color:#18181b} a:hover{color:#52525b}
  input,select,textarea{font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid #a1a1aa;outline-offset:0}
  button{font-family:inherit}
  .hidden{display:none!important}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* player frame theme vars set at runtime on #frame */
  #frame{--th-primary:#6366f1;--th-onPrimary:#fff;--th-bg:#fff;--th-ink:#18181b;--th-inkSoft:#52525b;--th-muted:#a1a1aa;
    --th-card:#fff;--th-field:#f4f4f5;--th-line:#e4e4e7;--th-fontDisplay:'Space Grotesk',sans-serif;
    --th-fontBody:-apple-system,sans-serif;--th-displayWeight:600;--th-displayTracking:0;--th-rFrame:16px;--th-rCard:12px;--th-rBtn:10px;--th-rInput:10px}
</style>
</head>
<body>

<!-- ================= TOP BAR ================= -->
<div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 22px;background:#111113;color:#fafafa;flex-wrap:wrap;border-bottom:1px solid #27272a;">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="width:30px;height:30px;border-radius:8px;background:#fafafa;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#111113;">Q</div>
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;line-height:1.1;letter-spacing:.01em;">Questline</div>
      <div style="font-size:10.5px;color:#71717a;letter-spacing:.08em;text-transform:uppercase;">Live riddle platform · prototype v2</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:2px;background:#1c1c1f;border-radius:10px;padding:3px;border:1px solid #27272a;">
    <button id="roleP" onclick="setRole('player')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Player</button>
    <button id="roleA" onclick="setRole('admin')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Game creator</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <button onclick="clockPlus()" title="Extend the live game by 1 minute" style="border:1px solid #3f3f46;cursor:pointer;padding:7px 13px;border-radius:8px;font-weight:500;font-size:11.5px;background:transparent;color:#a1a1aa;">Clock +1 min</button>
    <button onclick="resetView()" style="border:1px solid #3f3f46;cursor:pointer;padding:7px 13px;border-radius:8px;font-weight:500;font-size:11.5px;background:transparent;color:#a1a1aa;">Reset</button>
  </div>
</div>

<!-- ================= PLAYER ================= -->
<div id="player" style="display:flex;justify-content:center;padding:32px 14px 64px;">
  <div id="frame" style="width:min(408px,100%);border-radius:var(--th-rFrame);overflow:hidden;box-shadow:0 32px 80px -32px rgba(24,24,27,.4),0 4px 16px rgba(24,24,27,.1);background:var(--th-bg);color:var(--th-ink);min-height:730px;display:flex;flex-direction:column;font-family:var(--th-fontBody);">
    <div id="pscreen"></div>
  </div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden"></div>

<div id="toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:100;background:#18181b;color:#fafafa;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 16px 40px -12px rgba(24,24,27,.45);border:1px solid #3f3f46;opacity:0;transition:opacity .2s;pointer-events:none;"></div>

<script>
const SB_URL="https://shgbvoxbwmhhridiihxn.supabase.co";
const ANON="sb_publishable_S_K9CFTHDQRlLQOg9KPclA_wtJyavJr";
const $=id=>document.getElementById(id);
async function rpc(fn,args){const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",
  headers:{apikey:ANON,Authorization:"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify(args)});
  if(!r.ok)throw new Error("http "+r.status);return await r.json();}
let CODE=sessionStorage.getItem("admin_code")||"";
const a=(fn,args={})=>rpc(fn,{p_code:CODE,...args});
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmt(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60,p=n=>String(n).padStart(2,"0");return h?h+":"+p(m)+":"+p(s):p(m)+":"+p(s);}
let toastT;function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1900);}

// ---- role ----
let role="player";
function setRole(r){role=r;
  $("roleP").style.background=r==="player"?"#fafafa":"transparent";$("roleP").style.color=r==="player"?"#111113":"#a1a1aa";
  $("roleA").style.background=r==="admin"?"#fafafa":"transparent";$("roleA").style.color=r==="admin"?"#111113":"#a1a1aa";
  $("player").classList.toggle("hidden",r!=="player");
  $("admin").classList.toggle("hidden",r!=="player"?false:true); $("admin").classList.toggle("hidden",r!=="admin");
  if(r==="admin")renderAdmin();
}
function clockPlus(){ // extend the live game by 1 min (real analogue of the sandbox clock)
  adminData?.games?.filter(g=>g.status==="live").forEach(g=>a("admin_extend",{p_game:g.id,p_minutes:1}));
  toast("Live game clock +1 min");
}
function resetView(){pState={screen:"join",pin:"",name:"",active:null,team:""};localStorage.removeItem("q_token");localStorage.removeItem("q_pin");renderPlayer();}

// ===================== PLAYER =====================
const TH=["primary","onPrimary","bg","ink","inkSoft","muted","card","field","line","fontDisplay","fontBody","displayWeight","displayTracking","rFrame","rCard","rBtn","rInput"];
const map={fontDisplay:"fontDisplay",fontBody:"fontBody"};
function applyTheme(t){if(!t)return;const f=$("frame").style;const kv={primary:"--th-primary",onPrimary:"--th-onPrimary",bg:"--th-bg",ink:"--th-ink",inkSoft:"--th-inkSoft",muted:"--th-muted",card:"--th-card",field:"--th-field",line:"--th-line",fontDisplay:"--th-fontDisplay",fontBody:"--th-fontBody",displayWeight:"--th-displayWeight",displayTracking:"--th-displayTracking",rFrame:"--th-rFrame",rCard:"--th-rCard",rBtn:"--th-rBtn",rInput:"--th-rInput"};
  for(const k in kv)if(t[k]!=null)f.setProperty(kv[k],t[k]);}

let pState={screen:"join",pin:"",name:"",active:null,team:""},pGameState=null,pOffset=0,pRevealed=new Set(),pLookupT;
const pToken=()=>localStorage.getItem("q_token");
const serverNow=()=>Date.now()+pOffset;

async function pLookup(){
  const pin=pState.pin.trim(); if(pin.length<4){pState.active=null;renderPlayer();return;}
  try{const g=await rpc("get_game_by_pin",{p_pin:pin});pState.active=g.error?null:g;if(pState.active&&pState.active.theme)applyTheme(pState.active.theme);}catch{pState.active=null;}
  renderPlayer();
}
async function pEnter(){ if(!pState.active||pState.active.status!=="live"||!pState.name.trim())return; pState.screen="teams"; renderPlayer(); }
async function pJoin(team){
  const t=(team||pState.team||"").trim(); if(!t)return;
  try{const res=await rpc("join_game",{p_pin:pState.pin,p_team:t,p_name:pState.name});
    if(res.error){toast(joinErr(res.error));return;}
    localStorage.setItem("q_token",res.session_token);localStorage.setItem("q_pin",pState.pin.toUpperCase());
    applyState(res.state);pState.myTeam=t;pState.screen="lobby";renderPlayer();
  }catch{toast("Could not join.");}
}
function joinErr(e){return{bad_team:"Bad team name.",bad_name:"Enter your name.",not_found:"Game not found.",not_live:"Game hasn't started.",expired:"Game has ended.",full:"Team limit reached."}[e]||"Error.";}
function applyState(s){if(s.server_now)pOffset=Date.parse(s.server_now)-Date.now();pGameState=s;if(s.theme)applyTheme(s.theme);}
async function pRefresh(){const t=pToken();if(!t)return;try{const s=await rpc("get_state",{p_session:t});if(s.error==="bad_session"){localStorage.removeItem("q_token");pState.screen="join";}else{applyState(s);}renderPlayer();}catch{}}

// outbox
const loadOut=()=>{try{return JSON.parse(localStorage.getItem("q_outbox")||"[]")}catch{return[]}};
const saveOut=x=>localStorage.setItem("q_outbox",JSON.stringify(x));
async function flush(it){const r=await rpc("submit_answer",{p_session:it.token,p_input:it.input,p_mutation_id:it.mid});saveOut(loadOut().filter(i=>i.mid!==it.mid));return r;}
async function drain(){for(const it of loadOut()){try{await flush(it)}catch{}}}

let pFeedback=null,pAnswer="";
async function pSubmit(){
  const word=pAnswer.trim();if(!word)return;
  const it={token:pToken(),input:word,mid:crypto.randomUUID()};saveOut([...loadOut(),it]);
  try{const res=await flush(it);
    if(res.error==="expired"){pFeedback={msg:"Session ended.",bg:"#fffbeb",color:"#d97706",anim:"none"};await pRefresh();}
    else if(res.correct){pFeedback={msg:"Correct — next challenge",bg:"#f0fdf4",color:"#15803d",anim:"popin .3s ease"};pAnswer="";await pRefresh();return;}
    else{pFeedback={msg:"Not quite — try again",bg:"#fef2f2",color:"#b91c1c",anim:"shake .4s ease"};}
  }catch{pFeedback={msg:"No connection — saved, retrying…",bg:"#fffbeb",color:"#d97706",anim:"none"};}
  renderPlayer();
}

function renderPlayer(){
  const s=pState;
  if(pToken()&&pGameState&&(s.screen==="game"||s.screen==="done")){
    if(pGameState.finished)return pDone();
    return pGame();
  }
  if(s.screen==="lobby"&&pGameState)return pLobby();
  if(s.screen==="teams")return pTeams();
  return pJoinScreen();
}
// ---- Lobby ----
function pLobby(){
  const st=pGameState,g=pState.active||{};
  const exp=st.expires_at?Math.max(0,(Date.parse(st.expires_at)-serverNow())/1000):null;
  const others=(g.teams||[]).map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--th-rInput);background:var(--th-field);border:1px solid var(--th-line);">
    <span style="font-weight:600;font-size:13.5px;color:var(--th-ink);">${esc(t.name)}</span><span style="font-size:11.5px;color:var(--th-muted);">${t.players} ${t.players===1?"member":"members"}</span></div>`).join("");
  $("pscreen").innerHTML=`<div style="padding:30px 24px;display:flex;flex-direction:column;gap:14px;animation:fadeup .25s ease;">
    <div><div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--th-muted);">You are in</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:27px;margin-top:3px;letter-spacing:var(--th-displayTracking);">${esc(st.team.name)}</div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:17px;">${esc(pState.myTeam||st.team.name)}</div>
        <span style="font-size:11px;font-weight:600;letter-spacing:.06em;padding:4px 11px;border-radius:var(--th-rBtn);border:1px solid var(--th-line);color:var(--th-inkSoft);font-family:'Space Grotesk',monospace;">${esc(localStorage.getItem("q_pin"))}</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;"><span style="font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--th-rBtn);background:var(--th-field);border:1px solid var(--th-line);color:var(--th-ink);">${esc(pState.name)}</span></div>
      <div style="font-size:11.5px;color:var(--th-muted);">Share the game PIN so teammates can join your team.</div></div>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:22px;text-align:center;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--th-muted);">Game in progress</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:48px;font-variant-numeric:tabular-nums;color:var(--th-primary);margin-top:6px;letter-spacing:.01em;">${exp!=null?fmt(exp):"—"}</div>
      <div style="font-size:12px;color:var(--th-inkSoft);margin-top:4px;">time remaining</div></div>
    <button onclick="pState.screen='game';renderPlayer()" style="border:0;cursor:pointer;padding:15px;border-radius:var(--th-rBtn);font-family:var(--th-fontDisplay);font-weight:600;font-size:15.5px;background:var(--th-primary);color:var(--th-onPrimary);">Enter the game</button>
    <div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;"><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:15px;">In the lobby</div>
      <span style="font-size:11px;color:var(--th-muted);letter-spacing:.06em;text-transform:uppercase;">${(g.teams||[]).length} teams</span></div>
      <div style="display:flex;flex-direction:column;gap:7px;">${others||'<div style="font-size:12.5px;color:var(--th-muted);">Just your team so far.</div>'}</div></div></div>`;
}
// ---- Join ----
function pJoinScreen(){
  const g=pState.active, live=g&&g.status==="live"&&!g.expired;
  let card;
  if(g){
    const regColor=live?"#15803d":"#a1a1aa", regLabel=live?"Registration open":(g.expired?"Ended":(g.status==="ready"?"Not started":"Draft"));
    card=`<div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:20px;display:flex;flex-direction:column;gap:11px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;">
        <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:19px;">${esc(g.name)}</div>
        <span style="font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:${regColor};">● ${regLabel}</span></div>
      <div style="font-size:13px;color:var(--th-inkSoft);line-height:1.55;">${esc(g.description||"")}</div>
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);margin-top:4px;">Game PIN</label>
      <input id="pin" value="${esc(pState.pin)}" oninput="pState.pin=this.value;clearTimeout(pLookupT);pLookupT=setTimeout(pLookup,350)" placeholder="0000" style="width:100%;box-sizing:border-box;padding:14px;font-size:24px;letter-spacing:.4em;text-align:center;font-weight:600;font-family:'Space Grotesk',monospace;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);text-transform:uppercase;">
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Your name</label>
      <input id="pname" value="${esc(pState.name)}" oninput="pState.name=this.value" placeholder="e.g. Alex" style="width:100%;box-sizing:border-box;padding:13px 15px;font-size:15px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);">
      <button onclick="pEnter()" ${live?"":"disabled"} style="border:0;cursor:pointer;margin-top:6px;padding:15px;border-radius:var(--th-rBtn);font-family:var(--th-fontDisplay);font-weight:600;font-size:15.5px;letter-spacing:.02em;background:var(--th-primary);color:var(--th-onPrimary);min-height:50px;opacity:${live?1:.5};">Enter the game</button>
    </div>`;
  }else{
    card=`<div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:20px;display:flex;flex-direction:column;gap:11px;">
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--th-muted);">Game PIN</label>
      <input id="pin" value="${esc(pState.pin)}" oninput="pState.pin=this.value;clearTimeout(pLookupT);pLookupT=setTimeout(pLookup,350)" placeholder="0000" style="width:100%;box-sizing:border-box;padding:14px;font-size:24px;letter-spacing:.4em;text-align:center;font-weight:600;font-family:'Space Grotesk',monospace;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);text-transform:uppercase;">
      <div style="font-size:13.5px;color:var(--th-inkSoft);text-align:center;line-height:1.6;padding:6px 0;">Enter a game PIN to begin.<br>Try <strong>STAR42</strong>.</div></div>`;
  }
  $("pscreen").innerHTML=`<div style="padding:34px 24px;display:flex;flex-direction:column;gap:18px;animation:fadeup .25s ease;">
    <div style="padding:10px 0 2px;">
      <div style="width:44px;height:44px;border-radius:var(--th-rBtn);background:var(--th-primary);display:grid;place-items:center;font-family:var(--th-fontDisplay);font-size:22px;color:var(--th-onPrimary);">Q</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:30px;line-height:1.12;margin-top:14px;letter-spacing:var(--th-displayTracking);">Ready to play?</div>
      <div style="font-size:14px;color:var(--th-inkSoft);margin-top:6px;line-height:1.5;">Enter your game PIN and name to join.</div>
    </div>${card}</div>`;
}
// ---- Team pick ----
function pTeams(){
  const g=pState.active;
  const chips=(g.teams||[]).map(t=>`<button onclick="pJoin('${esc(t.name).replace(/'/g,"\\'")}')" style="border:1px solid var(--th-line);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:15px 17px;border-radius:var(--th-rCard);background:var(--th-card);color:var(--th-ink);min-height:58px;">
    <span style="display:flex;flex-direction:column;gap:2px;"><span style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:16px;">${esc(t.name)}</span>
    <span style="font-size:12px;color:var(--th-muted);">${t.players} ${t.players===1?"member":"members"}</span></span>
    <span style="font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--th-primary);white-space:nowrap;">Join</span></button>`).join("");
  $("pscreen").innerHTML=`<div style="padding:32px 24px;display:flex;flex-direction:column;gap:16px;animation:fadeup .25s ease;">
    <div><div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:27px;letter-spacing:var(--th-displayTracking);">Choose your team</div>
    <div style="font-size:13.5px;color:var(--th-inkSoft);margin-top:4px;">Welcome, ${esc(pState.name)}. Join a team or found your own.</div></div>
    <div style="display:flex;flex-direction:column;gap:9px;">${chips||'<div style="font-size:13px;color:var(--th-muted);">No teams yet — found the first one.</div>'}</div>
    <div style="display:flex;gap:10px;align-items:center;"><div style="flex:1;height:1px;background:var(--th-line);"></div>
      <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--th-muted);">or found one</span>
      <div style="flex:1;height:1px;background:var(--th-line);"></div></div>
    <div style="display:flex;gap:8px;"><input id="newteam" value="${esc(pState.team)}" oninput="pState.team=this.value" placeholder="New team name" style="flex:1;min-width:0;padding:13px 15px;font-size:14.5px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);">
      <button onclick="pJoin()" style="border:0;cursor:pointer;padding:0 20px;border-radius:var(--th-rBtn);font-weight:600;font-size:13.5px;background:var(--th-primary);color:var(--th-onPrimary);min-height:48px;">Create</button></div></div>`;
}
// ---- Game ----
function pGame(){
  const st=pGameState,q=st.question;
  const blocks=(q.blocks||[]).map(b=>{
    if(b.type==="text")return `<div style="font-size:15.5px;line-height:1.6;color:var(--th-ink);">${esc(b.text)}</div>`;
    if(b.type==="image")return `<div role="img" style="width:100%;aspect-ratio:16/10;border-radius:var(--th-rInput);border:1px solid var(--th-line);background:var(--th-field) center/cover no-repeat;background-image:url('${esc(b.url)}');"></div>`;
    if(b.type==="video")return `<video controls playsinline preload="metadata" src="${esc(b.url)}" style="width:100%;border-radius:var(--th-rInput);border:1px solid var(--th-line);background:#000;"></video>`;
    const lbl={video:"Watch video clue",audio:"Play audio clue",url:"Open link",link:"Open link"}[b.type]||"Open";

    }else{const rem=(Date.parse(st.activated_at)+h.reveal_after_min*60000-serverNow())/1000;badge="unlocks in "+fmt(rem>0?rem:0);badgeColor="var(--th-muted)";if(rem<=0)setTimeout(pRefresh,400);}

      <span style="font-size:11px;font-weight:600;color:${badgeColor};white-space:nowrap;font-variant-numeric:tabular-nums;">${badge}</span></div>${body}</div>`;
  }).join(""):`<div style="font-size:12.5px;color:var(--th-muted);">No hints for this challenge.</div>`;
  const fb=pFeedback?`<div style="font-size:13px;font-weight:600;text-align:center;padding:9px 12px;border-radius:var(--th-rInput);background:${pFeedback.bg};color:${pFeedback.color};animation:${pFeedback.anim};">${esc(pFeedback.msg)}</div>`:"";

      ${blocks}
      <div style="display:flex;gap:8px;margin-top:2px;">
        <input id="answer" value="${esc(pAnswer)}" oninput="pAnswer=this.value" onkeydown="if(event.key==='Enter')pSubmit()" placeholder="Your answer" style="flex:1;min-width:0;padding:13px 15px;font-size:15.5px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);color:var(--th-ink);">

function downloadTemplate(){const csv="title,intro,answer,block_text,hints\nHarbor clue,A short intro,ANCHOR,Look near the docks.,0:Check the pier;5:It's blue\n";
  const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a2=document.createElement("a");a2.href=u;a2.download="questline-template.csv";a2.click();URL.revokeObjectURL(u);}
function importCsv(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{
  const lines=String(rd.result).split(/\r?\n/).filter(l=>l.trim());const header=lines.shift().split(",").map(s=>s.trim().toLowerCase());const idx=n=>header.indexOf(n);
  lines.forEach(line=>{const c=parseCsv(line);const q=blankQ();q.title=c[idx("title")]||"";q.intro=c[idx("intro")]||"";q.answer=c[idx("answer")]||"";
    const bt=idx("block_text")>=0?c[idx("block_text")]:"";if(bt)q.blocks.push({type:"text",content:bt});
    const hs=idx("hints")>=0?c[idx("hints")]:"";if(hs)hs.split(";").forEach(p=>{const[m,...t]=p.split(":");q.hints.push({reveal_after_min:+m||0,text:t.join(":"),media_type:"",media_url:""});});
    wiz.questions.push(q);});wiz.sel=wiz.questions.length-1;drawAdmin();toast("Imported "+lines.length+" questions");};rd.readAsText(f);}
function parseCsv(line){const o=[];let c="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===","&&!q){o.push(c);c="";}else c+=ch;}o.push(c);return o.map(s=>s.trim());}

      <p style="margin:5px 0 0;font-size:12.5px;color:#71717a;">Watching "${esc(live.name||"")}" — PIN ${live.pin||""}</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;"><button onclick="adminExtend('${id}')" style="border:1px solid #e4e4e7;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:#18181b;">+15 min</button>
      <button onclick="newRun('${id}')" style="border:0;cursor:pointer;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12.5px;background:#18181b;color:#fff;">New run</button></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px;">${stats.map(s=>`<div style="background:#fafafa;border:1px solid #f0f0f1;border-radius:10px;padding:13px;"><div style="font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;">${s[0]}</div><div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;color:#18181b;margin-top:3px;">${s[1]}</div></div>`).join("")}</div></div>`;
  const tv=$("monTeams");if(tv)tv.innerHTML=`<div style="background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:24px;">
    <h2 style="margin:0 0 14px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;color:#18181b;">Team progress</h2><div style="display:flex;flex-direction:column;gap:9px;">
    ${m.teams.length?m.teams.map(t=>{const fin=!!t.finished_at;const pct=fin?100:Math.round(((t.stage_ord||1)-1)/m.total_questions*100);const c=fin?"#15803d":"#6366f1";
      return `<div style="border:1px solid #f0f0f1;border-radius:11px;padding:13px 16px;background:#fafafa;display:flex;flex-direction:column;gap:9px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="display:flex;align-items:baseline;gap:9px;"><strong style="font-size:13.5px;color:#18181b;">${esc(t.name)}</strong><span style="font-size:11px;color:#a1a1aa;">${t.players} ${t.players===1?"member":"members"}</span></div>
        <div style="display:flex;align-items:baseline;gap:12px;"><span style="font-size:12px;color:#71717a;">${fin?"Finished":"Q"+(t.stage_ord||1)+" "+esc(t.stage_title||"")}</span>
          <span style="font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:#18181b;font-family:'Space Grotesk',monospace;">${fmt(fin?t.total_seconds:t.seconds_on_stage)}</span>
          <button onclick="resetTeam('${t.id}')" style="border:1px solid #fecaca;background:#fff;color:#dc2626;cursor:pointer;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;">Reset</button></div></div>
      <div style="height:4px;border-radius:999px;background:#ececee;overflow:hidden;"><div style="height:100%;border-radius:999px;background:${c};transition:width .4s ease;width:${pct}%;"></div></div></div>`;}).join("")
    :'<div style="border:1px dashed #e4e4e7;border-radius:12px;padding:24px;text-align:center;color:#a1a1aa;font-size:13px;">No teams yet. Join from the Player view.</div>'}</div></div>`;
}
async function resetTeam(id){if(!confirm("Reset this team to the start?"))return;await a("admin_reset_team",{p_team:id});toast("Reset");}

// boot
setRole("player");
renderPlayer();
if(pToken())pRefresh();
</script>
</body>
</html>
