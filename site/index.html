<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-store, max-age=0" />
<title>Questline — live riddle platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f2f2f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#18181b;min-height:100vh}
  a{color:#18181b} a:hover{color:#52525b}
  input,select,textarea{font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid #a1a1aa;outline-offset:0}
  button{font-family:inherit}
  .hidden{display:none!important}
  /* wizard Questions step: list | editor | live preview (preview width is drag-resizable) */
  .wizGrid{display:grid;grid-template-columns:minmax(200px,270px) minmax(300px,1fr) var(--prevW,340px);gap:16px;align-items:start}
  .wizGrid.noPrev{grid-template-columns:minmax(200px,270px) 1fr auto}
  @media (max-width:1200px){.wizGrid{grid-template-columns:minmax(190px,240px) 1fr}.wizPrev{grid-column:2}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes popin{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* player frame theme vars set at runtime on #frame */
  #frame{--th-primary:#6366f1;--th-onPrimary:#fff;--th-bg:#fff;--th-ink:#18181b;--th-inkSoft:#52525b;--th-muted:#a1a1aa;
    --th-card:#fff;--th-field:#f4f4f5;--th-line:#e4e4e7;--th-fontDisplay:'Space Grotesk',sans-serif;
    --th-fontBody:-apple-system,sans-serif;--th-displayWeight:600;--th-displayTracking:0;--th-rFrame:16px;--th-rCard:12px;--th-rBtn:10px;--th-rInput:10px}
</style>
</head>
<body>

<!-- ================= TOP BAR ================= -->
<div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 22px;background:#111113;color:#fafafa;flex-wrap:wrap;border-bottom:1px solid #27272a;">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="width:30px;height:30px;border-radius:8px;background:#fafafa;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#111113;">Q</div>
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;line-height:1.1;letter-spacing:.01em;">Questline</div>
      <div style="font-size:10.5px;color:#71717a;letter-spacing:.08em;text-transform:uppercase;">Live riddle platform</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:2px;background:#1c1c1f;border-radius:10px;padding:3px;border:1px solid #27272a;">
    <button id="roleP" onclick="setRole('player')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Player</button>
    <button id="roleA" onclick="setRole('admin')" style="border:0;cursor:pointer;padding:8px 20px;border-radius:8px;font-weight:600;font-size:12.5px;letter-spacing:.02em;">Game creator</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"></div>
</div>

<!-- ================= PLAYER ================= -->
<div id="player" style="display:flex;justify-content:center;padding:32px 14px 64px;">
  <div id="frame" style="width:min(408px,100%);border-radius:var(--th-rFrame);overflow:hidden;box-shadow:0 32px 80px -32px rgba(24,24,27,.4),0 4px 16px rgba(24,24,27,.1);background:var(--th-bg);color:var(--th-ink);min-height:730px;display:flex;flex-direction:column;font-family:var(--th-fontBody);">
    <div id="pscreen"></div>
  </div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden"></div>

<div id="toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:100;background:#18181b;color:#fafafa;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 16px 40px -12px rgba(24,24,27,.45);border:1px solid #3f3f46;opacity:0;transition:opacity .2s;pointer-events:none;"></div>

<!-- Player notice popup (question cancelled, etc.) -->
<div id="noticePop" class="hidden" style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="width:min(400px,100%);background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4);">
    <div style="padding:16px 20px;background:#b91c1c;color:#fff;display:flex;align-items:center;gap:9px;"><span style="font-size:20px;">⚠️</span><span style="font-weight:700;font-size:15px;">Task cancelled</span></div>
    <div id="noticePopBody" style="padding:18px 20px;font-size:14px;line-height:1.55;color:#27272a;white-space:pre-line;"></div>
    <div style="padding:0 20px 18px;"><button onclick="dismissNotice()" style="width:100%;border:0;cursor:pointer;padding:12px;border-radius:10px;background:#18181b;color:#fff;font-weight:600;font-size:14px;">Got it</button></div>
  </div>
</div>

<!-- Join QR (admin shows this so captains can create their teams) -->
<div id="qrPop" class="hidden" style="position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)closeQR()">
  <div style="background:#fff;border-radius:16px;padding:26px;display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center;max-width:min(460px,100%);">
    <div id="qrTitle" style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#18181b;"></div>
    <div id="qrBox" style="width:300px;height:300px;max-width:68vw;max-height:68vw;display:grid;place-items:center;"></div>
    <div id="qrCode" style="font-family:'Space Grotesk',monospace;font-weight:700;font-size:30px;letter-spacing:.3em;padding-left:.3em;color:#18181b;"></div>
    <div id="qrHint" style="font-size:12.5px;color:#71717a;line-height:1.5;"></div>
    <button onclick="closeQR()" style="border:1px solid #e4e4e7;cursor:pointer;padding:9px 18px;border-radius:9px;font-weight:600;font-size:12.5px;background:#fff;color:#18181b;">Close</button>
  </div>
</div>

<!-- Spectator (see what a team sees) -->
<div id="spectator" class="hidden" style="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:36px 16px;overflow:auto;" onclick="if(event.target===this)closeSpectate()">
  <div style="width:min(440px,100%);background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.35);">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:#111113;color:#fff;">
      <span id="specTitle" style="font-weight:600;font-size:13.5px;">Spectating</span>
      <span style="display:flex;gap:8px;"><button onclick="if(specTeam)spectate(specTeam)" title="Refresh" style="border:0;background:transparent;color:#a1a1aa;cursor:pointer;font-size:14px;">↻</button>
      <button onclick="closeSpectate()" style="border:0;background:transparent;color:#a1a1aa;cursor:pointer;font-size:18px;line-height:1;">✕</button></span></div>
    <div id="specBody"></div>
  </div>
</div>

<script>
const SB_URL="https://shgbvoxbwmhhridiihxn.supabase.co";
const ANON="sb_publishable_S_K9CFTHDQRlLQOg9KPclA_wtJyavJr";
const $=id=>document.getElementById(id);
async function rpc(fn,args){const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",
  headers:{apikey:ANON,Authorization:"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify(args)});
  if(!r.ok)throw new Error("http "+r.status);return await r.json();}
let CODE=sessionStorage.getItem("admin_code")||"";
let adminOffset=0;   // server clock − client clock (from admin_list.server_now)
const a=(fn,args={})=>rpc(fn,{p_code:CODE,...args}).then(r=>{if(r&&r.server_now)adminOffset=Date.parse(r.server_now)-Date.now();return r;});
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function safeUrl(u){try{const p=new URL(u,location.origin).protocol;return(p==="http:"||p==="https:")?u:"#";}catch{return"#";}}
function fmt(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60,p=n=>String(n).padStart(2,"0");return h?h+":"+p(m)+":"+p(s):p(m)+":"+p(s);}
let toastT;function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1900);}

// ---- role ----
let role="player";
function setRole(r){role=r;if(monTimer){clearInterval(monTimer);monTimer=null;}
  $("roleP").style.background=r==="player"?"#fafafa":"transparent";$("roleP").style.color=r==="player"?"#111113":"#a1a1aa";
  $("roleA").style.background=r==="admin"?"#fafafa":"transparent";$("roleA").style.color=r==="admin"?"#111113":"#a1a1aa";
  $("player").classList.toggle("hidden",r!=="player");
  $("admin").classList.toggle("hidden",r!=="player"?false:true); $("admin").classList.toggle("hidden",r!=="admin");
  if(r==="admin")renderAdmin();
}
function clockPlus(){ // extend the live game by 1 min (real analogue of the sandbox clock)
  adminData?.games?.filter(g=>g.status==="live").forEach(g=>a("admin_extend",{p_game:g.id,p_minutes:1}));
  toast("Live game clock +1 min");
}
function resetView(){pState={screen:"join",pin:"",name:"",active:null,team:""};localStorage.removeItem("q_token");localStorage.removeItem("q_pin");localStorage.removeItem("q_outbox");renderPlayer();}

// ===================== PLAYER =====================
const TH=["primary","onPrimary","bg","ink","inkSoft","muted","card","field","line","fontDisplay","fontBody","displayWeight","displayTracking","rFrame","rCard","rBtn","rInput"];
const map={fontDisplay:"fontDisplay",fontBody:"fontBody"};
function applyTheme(t){if(!t)return;const f=$("frame").style;const kv={primary:"--th-primary",onPrimary:"--th-onPrimary",bg:"--th-bg",ink:"--th-ink",inkSoft:"--th-inkSoft",muted:"--th-muted",card:"--th-card",field:"--th-field",line:"--th-line",fontDisplay:"--th-fontDisplay",fontBody:"--th-fontBody",displayWeight:"--th-displayWeight",displayTracking:"--th-displayTracking",rFrame:"--th-rFrame",rCard:"--th-rCard",rBtn:"--th-rBtn",rInput:"--th-rInput"};
  for(const k in kv)if(t[k]!=null)f.setProperty(kv[k],t[k]);}

let pState={screen:"join",pin:"",name:"",active:null,team:""},pGameState=null,pOffset=0,pRevealed=new Set(),pLookupT;
const pToken=()=>localStorage.getItem("q_token");
const serverNow=()=>Date.now()+pOffset;

async function pLookup(){
  const pin=pState.pin.trim(); if(pin.length<4){pState.active=null;renderPlayer();return;}
  try{const g=await rpc("get_game_by_pin",{p_pin:pin});if(pState.pin.trim()!==pin)return;pState.active=g.error?null:g;if(pState.active&&pState.active.theme)applyTheme(pState.active.theme);}catch{if(pState.pin.trim()===pin)pState.active=null;}
  renderPlayer();
}
async function pEnter(){ if(!pState.active||pState.active.status!=="live"||!pState.name.trim())return;
  clearTimeout(pLookupT);            // a late lookup must not null out the game we just entered
  pState.screen="teams"; renderPlayer(); }
function pJoinIndex(i){const t=(pState.active&&pState.active.teams||[])[i];if(t)pJoin(t.name);}
async function pJoin(team){
  const t=(team||pState.team||"").trim(); if(!t)return;
  try{const res=await rpc("join_game",{p_pin:pState.pin,p_team:t,p_name:pState.name});
    if(res.error){toast(joinErr(res.error));return;}
    localStorage.setItem("q_token",res.session_token);localStorage.setItem("q_pin",pState.pin.toUpperCase());
    applyState(res.state);pState.myTeam=t;pState.screen="lobby";renderPlayer();
  }catch{toast("Could not join.");}
}
function joinErr(e){return{bad_team:"Bad team name.",bad_name:"Enter your name.",not_found:"Game not found.",not_live:"Game hasn't started.",expired:"Game has ended.",full:"Team limit reached."}[e]||"Error.";}
function applyState(s){if(s.server_now)pOffset=Date.parse(s.server_now)-Date.now();pGameState=s;if(s.theme)applyTheme(s.theme);}
async function pRefresh(){const t=pToken();if(!t)return;try{const s=await rpc("get_state",{p_session:t});
  if(s.error==="bad_session"){localStorage.removeItem("q_token");pState.screen="join";}
  else{applyState(s);if(!["lobby","game","done"].includes(pState.screen))pState.screen=s.finished?"done":"game";}
  renderPlayer();}catch{}}

// outbox
const loadOut=()=>{try{return JSON.parse(localStorage.getItem("q_outbox")||"[]")}catch{return[]}};
const saveOut=x=>localStorage.setItem("q_outbox",JSON.stringify(x));
async function flush(it){const r=await rpc("submit_answer",{p_session:it.token,p_input:it.input,p_mutation_id:it.mid});saveOut(loadOut().filter(i=>i.mid!==it.mid));return r;}
async function drain(){for(const it of loadOut()){try{await flush(it)}catch{}}}

let pFeedback=null,pAnswer="";
async function pSubmit(){
  const word=pAnswer.trim();if(!word)return;
  const it={token:pToken(),input:word,mid:crypto.randomUUID()};saveOut([...loadOut(),it]);
  try{const res=await flush(it);
    if(res.error==="expired"){pFeedback={msg:"Session ended.",bg:"#fffbeb",color:"#d97706",anim:"none"};await pRefresh();}
    else if(res.correct){pFeedback={msg:"Correct — next challenge",bg:"#f0fdf4",color:"#15803d",anim:"popin .3s ease"};pAnswer="";await pRefresh();return;}
    else{pFeedback={msg:"Not quite — try again",bg:"#fef2f2",color:"#b91c1c",anim:"shake .4s ease"};}
  }catch{pFeedback={msg:"No connection — saved, retrying…",bg:"#fffbeb",color:"#d97706",anim:"none"};}
  renderPlayer();
}

// Total time since the game started — a per-question timer resets to 00:00 on every new
// challenge, which reads as a broken clock while you're solving.
const pElapsedBase=st=>(st&&(st.starts_at||st.activated_at))||null;
// Hints unlock relative to when THIS challenge became active (starts_at only as a guard).
const hintBase=st=>Date.parse((st&&(st.activated_at||st.starts_at))||0)||0;
function renderPlayer(){
  const s=pState,scr=$("pscreen");
  // any screen other than join owns pscreen outright — drop the cached join DOM
  if(((pToken()&&pGameState)||s.screen==="teams")&&scr.dataset.view==="join")scr.dataset.view="";
  if(pToken()&&pGameState){
    if(pGameState.finished||pGameState.expired)return pDone();
    if(pGameState.started===false)return pCountdown();
    if(pGameState.paused)return pPaused();
    if(s.screen==="lobby")return pLobby();
    return pGame();
  }
  if(s.screen==="teams")return pTeams();
  return pJoinScreen();
}
// ---- Paused ----
function pPaused(){
  const st=pGameState;
  $("pscreen").innerHTML=`<div style="padding:44px 24px;text-align:center;display:flex;flex-direction:column;gap:14px;min-height:640px;justify-content:center;animation:fadeup .25s ease;">
    <div style="font-size:40px;">⏸</div>
    <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:26px;letter-spacing:var(--th-displayTracking);">Game paused</div>
    <div style="font-size:15px;color:var(--th-inkSoft);line-height:1.6;">${esc(st.pause_message||"The host paused the game. Please wait.")}</div>
    <div style="font-size:12px;color:var(--th-muted);">Your timer is frozen — you won't lose any time.</div></div>`;
}
// ---- notices (toast admin messages, e.g. discarded task) ----
const shownNotices=new Set((()=>{try{return JSON.parse(localStorage.getItem("q_notices")||"[]")}catch{return[]}})());
let noticeQ=[];
async function pNotices(){
  const t=pToken();if(!t)return;
  try{const ns=await rpc("get_notices",{p_session:t});if(!Array.isArray(ns))return;
    const fresh=ns.filter(n=>!shownNotices.has(n.id));
    if(fresh.length){
      fresh.forEach(n=>shownNotices.add(n.id));
      localStorage.setItem("q_notices",JSON.stringify([...shownNotices]));
      noticeQ.push(...fresh.map(n=>n.message));
      showNextNotice();
    }
  }catch{}
}
function showNextNotice(){
  const pop=$("noticePop");if(!pop||!pop.classList.contains("hidden"))return; // one at a time
  const msg=noticeQ.shift();if(msg==null)return;
  $("noticePopBody").textContent=msg;
  pop.classList.remove("hidden");
}
function dismissNotice(){$("noticePop").classList.add("hidden");if(noticeQ.length)setTimeout(showNextNotice,180);}
// ---- Countdown to start ----
function pCountdown(){
  const st=pGameState;
  const rem=st.starts_at?(Date.parse(st.starts_at)-serverNow())/1000:0;
  $("pscreen").innerHTML=`<div style="padding:40px 24px;display:flex;flex-direction:column;gap:16px;text-align:center;animation:fadeup .25s ease;min-height:640px;justify-content:center;">
    <div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--th-muted);">${esc(st.game_name||"")}</div>
    <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:26px;letter-spacing:var(--th-displayTracking);">Get ready, ${esc(st.team.name)}</div>
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--th-muted);margin-top:6px;">Game starts in</div>
    <div id="pCd" style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:56px;font-variant-numeric:tabular-nums;color:var(--th-primary);">${rem>0?fmt(rem):"0:00"}</div>
    <div style="font-size:13px;color:var(--th-inkSoft);">The first challenge unlocks automatically when the timer hits zero.</div>
    ${inviteCard(st.team.name)}</div>`;
  renderQR("pQR",inviteURL());
}
// ---- Invite (team code + QR) ----
// The QR encodes a deep link carrying the game PIN (+ team), so scanning it does exactly what
// typing the game code does — it just also drops the teammate straight into the right team.
function inviteURL(){
  const pin=localStorage.getItem("q_pin")||"";
  const team=pState.myTeam||(pGameState&&pGameState.team?pGameState.team.name:"")||"";
  return location.origin+location.pathname+"?pin="+encodeURIComponent(pin)+(team?"&team="+encodeURIComponent(team):"");
}
function renderQR(elId,text){
  const el=$(elId);if(!el)return;
  if(el.dataset.qr===text)return;                 // already drawn (screens re-render every 10s)
  el.dataset.qr=text;
  if(typeof qrcode==="undefined"){el.innerHTML='<span style="font-size:11px;color:#a1a1aa;text-align:center;">QR unavailable —<br>use the code below</span>';return;}
  try{const qr=qrcode(0,"M");qr.addData(text);qr.make();
    el.innerHTML=qr.createSvgTag({cellSize:4,margin:0,scalable:true});
    const svg=el.querySelector("svg");if(svg){svg.style.width="100%";svg.style.height="100%";svg.removeAttribute("width");svg.removeAttribute("height");}
  }catch(e){el.innerHTML='<span style="font-size:11px;color:#a1a1aa;">QR error</span>';}
}
function copyInvite(){
  const u=inviteURL();
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(u).then(()=>toast("Invite link copied"),()=>toast(u));
  else toast(u);
}
// Shown on the countdown (pre-start — where the founder actually waits) and in the lobby.
function inviteCard(teamName){
  return `<div style="background:var(--th-card);border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:18px;display:flex;flex-direction:column;gap:11px;align-items:center;text-align:center;">
    <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:15px;">Invite teammates</div>
    <div id="pQR" style="width:174px;height:174px;display:grid;place-items:center;background:#fff;border:1px solid var(--th-line);border-radius:12px;padding:8px;box-sizing:border-box;"></div>
    <div style="font-size:12px;color:var(--th-inkSoft);">Scan to join <b>${esc(teamName||"")}</b> — or enter the game code:</div>
    <div style="font-family:'Space Grotesk',monospace;font-weight:700;font-size:25px;letter-spacing:.3em;color:var(--th-ink);padding-left:.3em;">${esc(localStorage.getItem("q_pin")||"")}</div>
    <button onclick="copyInvite()" style="border:1px solid var(--th-line);cursor:pointer;padding:9px 16px;border-radius:var(--th-rBtn);font-weight:600;font-size:12.5px;background:var(--th-field);color:var(--th-ink);">Copy invite link</button></div>`;
}
// ---- Lobby ----
function pLobby(){
  const st=pGameState,g=pState.active||{};
  const exp=st.expires_at?Math.max(0,(Date.parse(st.expires_at)-serverNow())/1000):null;
  const others=(g.teams||[]).map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--th-rInput);background:var(--th-field);border:1px solid var(--th-line);">
    <span style="font-weight:600;font-size:13.5px;color:var(--th-ink);">${esc(t.name)}</span><span style="font-size:11.5px;color:var(--th-muted);">${t.players} ${t.players===1?"member":"members"}</span></div>`).join("");
  $("pscreen").innerHTML=`<div style="padding:30px 24px;display:flex;flex-direction:column;gap:14px;animation:fadeup .25s ease;">
    <div><div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--th-muted);">You are in</div>
      <div style="font-family:var(--th-fontDisplay);font-weight:var(--th-displayWeight);font-size:27px;margin-top:3px;letter-spacing:var(--th-displayTracking);">${esc(st.team.name)}</div></div>

// --- media URL helpers -------------------------------------------------------
// Google Drive "share" links (/file/d/ID/view, uc?id=, open?id=) are HTML pages, not media,
// so <img src> / <video src> can never load them. Normalise them to embeddable forms.
const isDrive=u=>/(?:drive|docs)\.google\.com/.test(String(u));
function driveId(u){
  const s=String(u);
  const m=s.match(/\/file\/d\/([A-Za-z0-9_-]{10,})/)||s.match(/[?&]id=([A-Za-z0-9_-]{10,})/);
  return m?m[1]:null;
}
function ytId(u){
  const m=String(u).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m?m[1]:null;
}
function imgSrc(u){                                   // → something an <img> can actually load
  if(/^data:image\//i.test(String(u)))return u;       // inline base64 images are fine in <img>
  const id=isDrive(u)?driveId(u):null;
  return id?("https://drive.google.com/thumbnail?id="+id+"&sz=w2000"):safeUrl(u);
}
function videoEmbed(u){                               // → iframe src, or null if not embeddable
  const id=isDrive(u)?driveId(u):null;
  if(id)return "https://drive.google.com/file/d/"+id+"/preview";
  const y=ytId(u);
  if(y)return "https://www.youtube.com/embed/"+y;
  return null;
}
const isFile=(u,ext)=>new RegExp("\\.("+ext+")(\\?|#|$)","i").test(String(u));
let _vidN=0;

function pPlayFs(id){
  const box=$(id); if(!box)return;
  const v=box.querySelector("video"), t=v||box;
  const req=t.requestFullscreen||t.webkitRequestFullscreen||t.webkitEnterFullscreen||t.msRequestFullscreen;
  try{ if(req)req.call(t); }catch{}
  if(v){try{const p=v.play();if(p&&p.catch)p.catch(()=>{});}catch{}}
}

  const url=b.url!=null?b.url:(b.content||"");

    return `<img src="${esc(imgSrc(url))}" alt="" loading="lazy" onerror="this.style.display='none';if(this.nextElementSibling)this.nextElementSibling.style.display='flex';" style="width:100%;border-radius:var(--th-rInput);border:1px solid var(--th-line);display:block;background:var(--th-field);">`
      +`<a href="${esc(safe)}" target="_blank" rel="noopener" style="display:none;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--th-line);border-radius:var(--th-rInput);background:var(--th-field);text-decoration:none;color:var(--th-ink);font-weight:600;font-size:12.5px;">↗ Open image</a>`;
  if(b.type==="video"){
    const emb=videoEmbed(url), id="vid"+(++_vidN);
    const inner=emb

  }

function startPrevResize(e){                       // drag the preview wider/narrower

  const grid=document.querySelector(".wizGrid"); if(!grid)return;
  const x0=e.clientX,w0=_prevW;
  const mv=ev=>{_prevW=Math.max(260,Math.min(900,w0+(x0-ev.clientX)));grid.style.setProperty("--prevW",_prevW+"px");};

    document.removeEventListener("pointercancel",up);localStorage.setItem("q_prevW",String(_prevW));};

}

    questions:wiz.questions.map(q=>({title:q.title,intro:q.intro,info:q.info||"",case_sensitive:!!q.case_sensitive,answer:q.answer,alt_answers:[],
      blocks:q.blocks.map(b=>b.type==="text"?{type:"text",text:b.content}:{type:b.type==="url"?"link":b.type,url:b.content}),
      hints:q.hints.map(h=>({reveal_after_min:h.reveal_after_min,
        blocks:(h.blocks||[]).map(b=>b.type==="text"?{type:"text",text:b.content}:{type:(b.type==="url"||b.type==="link")?"link":b.type,url:b.content})}))}))};
  const res=await a("admin_save_game",{p_payload:payload});

// ---- XLSX template / export -------------------------------------------------
// Export writes exactly what import reads, so a game round-trips losslessly:
//  * extra blocks repeat the Title on further rows (block order preserved)
//  * HintNo groups several rows into one hint
const _slug=s=>String(s||"game").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,40)||"game";
const _mtOut=b=>b.type==="url"?"link":b.type;
// Pack blocks into rows, collapsing a text-then-media pair onto one row (import reads it back
// in that same order); anything else gets its own row so ordering survives.
function _packBlocks(list){
  const a=list||[],rows=[];let i=0;
  while(i<a.length){
    const b=a[i];
    if(b.type==="text"&&a[i+1]&&a[i+1].type!=="text"){rows.push({text:b.content,media:a[i+1]});i+=2;}
    else if(b.type==="text"){rows.push({text:b.content,media:null});i+=1;}
    else{rows.push({text:"",media:b});i+=1;}
  }
  if(!rows.length)rows.push({text:"",media:null});
  return rows;
}
function buildGameWb(name,description,maxTeams,qs){
  const wb=XLSX.utils.book_new();
  const G=[["Name","Description","MaxTeams"],[name||"",description||"",maxTeams||20]];
  const Q=[["Title","Intro","Answer","Info","CaseSensitive","Text","MediaType","MediaURL"]];
  const H=[["Question","HintNo","RevealAfterMin","Text","MediaType","MediaURL"]];
  (qs||[]).forEach(q=>{
    _packBlocks(q.blocks).forEach((r,i)=>Q.push([q.title||"",i?"":(q.intro||""),i?"":(q.answer||""),i?"":(q.info||""),
      i?"":(q.case_sensitive?"yes":"no"),r.text||"",r.media?_mtOut(r.media):"",r.media?r.media.content:""]));
    (q.hints||[]).forEach((h,hi)=>_packBlocks(h.blocks).forEach((r,i)=>
      H.push([q.title||"",hi+1,i?"":(Number(h.reveal_after_min)||0),r.text||"",r.media?_mtOut(r.media):"",r.media?r.media.content:""])));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(G),"Game");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(Q),"Questions");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(H),"Hints");
  return wb;
}
// admin_get_game / DB shape ({type,text|url}) -> wizard shape ({type,content})
function gameToWizQs(g){
  return (g.questions||[]).map(q=>({
    title:q.title||"",intro:q.intro||"",answer:q.answer||"",info:q.info||"",case_sensitive:!!q.case_sensitive,
    blocks:(q.blocks||[]).map(b=>({type:b.type,content:b.text||b.url||""})),
    hints:(q.hints||[]).map(h=>{
      let bl=(h.blocks||[]).map(b=>({type:b.type,content:b.text||b.url||""}));
      if(!bl.length){if(h.text)bl.push({type:"text",content:h.text});if(h.media_type&&h.media_url)bl.push({type:h.media_type,content:h.media_url});}
      return {reveal_after_min:h.reveal_after_min,blocks:bl};})}));
}
const _xlsxReady=()=>{if(typeof XLSX==="undefined"){toast("Spreadsheet library still loading — try again in a moment");return false;}return true;};

const _mt=v=>{const s=String(v||"").trim().toLowerCase();return ["image","video","audio","link","url"].includes(s)?(s==="url"?"link":s):"";};
// Pure parser (no DOM) — reads exactly what buildGameWb writes. Kept separate so the
// export→import round-trip can be tested outside the browser.
function parseGameWb(wb){
  const findSheet=n=>wb.SheetNames.find(s=>s.toLowerCase()===n)||wb.SheetNames.find(s=>s.toLowerCase().includes(n));
  const qsn=findSheet("questions"); if(!qsn)throw new Error("No 'Questions' sheet found");
  const qs=wb.Sheets[qsn], hs=wb.Sheets[findSheet("hints")];
  const get=(r,k)=>{const kk=Object.keys(r).find(x=>x.toLowerCase().replace(/\s/g,"")===k);return kk?String(r[kk]).trim():"";};
  const addBlocks=(r,arr)=>{                       // one row may carry a text and/or a media block
    const t=get(r,"text"); if(t)arr.push({type:"text",content:t});
    const mt=_mt(get(r,"mediatype")), mu=get(r,"mediaurl"); if(mt&&mu)arr.push({type:mt,content:mu});
  };
  let meta=null;
  const gsn=findSheet("game");
  if(gsn){
    const g0=(XLSX.utils.sheet_to_json(wb.Sheets[gsn],{defval:""})[0])||{};
    meta={name:get(g0,"name"),description:get(g0,"description"),max_teams:+get(g0,"maxteams")||0};
  }
  const byTitle={},added=[];
  XLSX.utils.sheet_to_json(qs,{defval:""}).filter(r=>get(r,"title")).forEach(r=>{
    const title=get(r,"title"),key=title.toLowerCase();
    let q=byTitle[key];
    if(!q){                                        // first row for this title = the question itself
      q={title,intro:get(r,"intro"),answer:get(r,"answer"),info:get(r,"info"),
         case_sensitive:/^(y|yes|true|1|case)/i.test(get(r,"casesensitive")),blocks:[],hints:[]};
      byTitle[key]=q; added.push(q);
    }
    addBlocks(r,q.blocks);                         // repeated title = extra blocks, in row order
  });
  const hByKey={};
  (hs?XLSX.utils.sheet_to_json(hs,{defval:""}):[]).forEach(r=>{
    const q=byTitle[get(r,"question").toLowerCase()]; if(!q)return;
    const no=get(r,"hintno"), key=q.title.toLowerCase()+"|"+no;
    let h=no?hByKey[key]:null;                     // same HintNo = more blocks for that hint
    if(!h){
      h={reveal_after_min:+get(r,"revealaftermin")||0,blocks:[],_bt:"text",_bc:""};
      q.hints.push(h); if(no)hByKey[key]=h;        // no HintNo (old sheets) = one hint per row
    }
    addBlocks(r,h.blocks);
  });
  return {meta,questions:added};
}
function importXlsx(ev){const f=ev.target.files[0];if(!f)return;
  if(!_xlsxReady())return;
  const rd=new FileReader();
  rd.onload=()=>{try{
    const {meta,questions:added}=parseGameWb(XLSX.read(new Uint8Array(rd.result),{type:"array"}));
    if(meta){                                      // only fill what the wizard hasn't got — never clobber
      if(meta.name&&!String(wiz.name||"").trim())wiz.name=meta.name;
      if(meta.description&&!String(wiz.description||"").trim())wiz.description=meta.description;
      if(meta.max_teams)wiz.max_teams=meta.max_teams;
    }
    added.forEach(q=>wiz.questions.push(q)); wiz.sel=Math.max(0,wiz.questions.length-1); drawAdmin();
    toast("Imported "+added.length+" questions, "+added.reduce((n,q)=>n+q.hints.length,0)+" hints");
  }catch(e){toast("Import failed: "+e.message);}};
  rd.readAsArrayBuffer(f); ev.target.value="";}

    const info=q.info?`<div style="background:color-mix(in srgb,var(--th-primary) 9%,var(--th-card));border:1px solid var(--th-line);border-left:3px solid var(--th-primary);border-radius:var(--th-rInput);padding:11px 13px;font-size:13px;color:var(--th-ink);"><span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--th-primary);display:block;margin-bottom:3px;">ⓘ Important</span>${esc(q.info)}</div>`:"";
    const hints=(st.hints||[]).slice().sort((a,b)=>a.ord-b.ord).map(h=>{
      if(h.unlocked){const hb=(h.blocks&&h.blocks.length)?h.blocks.map(pBlock).join(""):(h.text?`<div style="font-size:13px;color:var(--th-ink);">${esc(h.text)}</div>`:"");
        return `<div style="border-top:1px solid var(--th-line);padding:9px 0;"><div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--th-ink);">Hint ${String(h.ord).padStart(2,"0")} · unlocked</div><div style="margin-top:6px;display:flex;flex-direction:column;gap:7px;">${hb}</div></div>`;}
      return `<div style="border-top:1px solid var(--th-line);padding:9px 0;opacity:.7;"><div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--th-muted);">Hint ${String(h.ord).padStart(2,"0")} · locked · after ${h.reveal_after_min}m</div></div>`;
    }).join("");
    inner=`<div style="padding:20px;display:flex;flex-direction:column;gap:11px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--th-muted);">${esc(st.team.name)} · Challenge ${q.ord} of ${st.total_questions}</div>
      <div style="font-family:var(--th-fontDisplay);font-size:21px;line-height:1.2;">${esc(q.title)}</div>
      ${q.intro?`<div style="font-size:12.5px;color:var(--th-inkSoft);font-style:italic;">${esc(q.intro)}</div>`:""}
      ${blocks?`<div style="display:flex;flex-direction:column;gap:9px;">${blocks}</div>`:""}
      ${info}
      <div style="border:1px solid var(--th-line);border-radius:var(--th-rCard);padding:13px;"><div style="font-family:var(--th-fontDisplay);font-size:14px;margin-bottom:4px;">Hints</div>${hints||'<div style="color:var(--th-muted);font-size:12px;">No hints.</div>'}</div></div>`;
  }
  document.getElementById("specBody").innerHTML=`<div style="${vars}font-family:var(--th-fontBody);background:var(--th-bg);color:var(--th-ink);">${inner}</div>`;
  document.getElementById("specTitle").textContent="Team view — "+(st.team?.name||"");
  document.getElementById("spectator").classList.remove("hidden");
}
function closeSpectate(){document.getElementById("spectator").classList.add("hidden");specTeam=null;}

// boot
setRole("player");
renderPlayer();
if(pToken())pRefresh();
// Deep link from an invite QR: ?pin=XXXX(&team=Name) — same effect as typing the game code.
(function(){
  const p=new URLSearchParams(location.search);
  const pin=p.get("pin"),team=p.get("team");
  if(!pin||pToken())return;                       // already in a game → leave the session alone
  pState.pin=pin.trim().toUpperCase();
  if(team)pState.team=team;
  pLookup();
})();
</script>
</body>
</html>
